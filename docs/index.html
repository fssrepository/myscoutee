  <style>
    html,
    body {
      min-height: 100%;
      background: #f5f6fb;
    }

    app-root {
      display: block;
      min-height: 100vh;
    }

    .app-warmup-fallback {
      position: fixed;
      inset: 0;
      z-index: 9999;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      box-sizing: border-box;
      padding: 1.25rem;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.94) 0%, rgba(245, 247, 253, 0.96) 46%, rgba(239, 244, 255, 0.98) 100%);
      color: #1f3a63;
      font-family: 'Nunito Sans', 'Segoe UI', Roboto, Arial, sans-serif;
      text-align: center;
    }

    .app-bootstrapped .app-warmup-fallback {
      display: none;
    }

    .app-warmup-fallback-mark {
      position: relative;
      width: 76px;
      height: 76px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 18px 34px rgba(36, 65, 110, 0.16);
    }

    .app-warmup-fallback-mark img {
      position: relative;
      z-index: 1;
      width: 46px;
      height: 46px;
      display: block;
      object-fit: contain;
    }

    .app-warmup-fallback-ring {
      position: absolute;
      inset: -5px;
      border-radius: inherit;
      background:
        conic-gradient(from 40deg, #4f7cff 0deg, #7b5cff 120deg, #ff4d8d 230deg, rgba(79, 124, 255, 0.08) 310deg, #4f7cff 360deg);
      animation: app-warmup-spin 0.95s linear infinite;
    }

    .app-warmup-fallback-ring::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: inherit;
      background: #ffffff;
    }

    .app-warmup-fallback-label {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .app-warmup-fallback-status {
      display: none;
      max-width: 22rem;
      color: #37506f;
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1.38;
    }

    .app-warmup-fallback-retry {
      display: none;
      min-width: 96px;
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      background: #245f9f;
      color: #ffffff;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(36, 95, 159, 0.2);
    }

    .app-warmup-fallback-retry[hidden] {
      display: none;
    }

    .app-warmup-offline .app-warmup-fallback {
      gap: 0.72rem;
    }

    .app-warmup-offline .app-warmup-fallback-ring {
      animation: none;
      background: #d94848;
    }

    .app-warmup-offline .app-warmup-fallback-ring::before {
      content: '!';
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 900;
    }

    .app-warmup-offline .app-warmup-fallback-mark img {
      opacity: 0;
    }

    .app-warmup-offline .app-warmup-fallback-status {
      display: block;
    }

    .app-warmup-offline .app-warmup-fallback-retry:not([hidden]) {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes app-warmup-spin {
      to {
        transform: rotate(1turn);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-warmup-fallback-ring {
        animation-duration: 1.8s;
      }
    }
  </style>
  <script>
    // Restore route after 404 redirect from GitHub Pages
    (function(){
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        history.replaceState(null, '', redirect);
      }
    })();
  </script>
  <script>
    (function(){
      var BOOTSTRAPPED_CLASS = 'app-bootstrapped';
      var OFFLINE_CLASS = 'app-warmup-offline';
      var FALLBACK_TIMEOUT_MS = 9000;
      var DEFAULT_TITLE = 'No network';
      var DEFAULT_MESSAGE = 'The app cannot finish loading because the server is not reachable.';

      function isBootstrapped() {
        return document.documentElement.classList.contains(BOOTSTRAPPED_CLASS);
      }

      function setText(selector, value) {
        var element = document.querySelector(selector);
        if (element) {
          element.textContent = value;
        }
      }

      function showWarmupFailure(title, message) {
        if (isBootstrapped()) {
          return;
        }
        document.documentElement.classList.add(OFFLINE_CLASS);
        setText('[data-warmup-label]', title || DEFAULT_TITLE);
        setText('[data-warmup-status]', message || DEFAULT_MESSAGE);
        var fallback = document.querySelector('.app-warmup-fallback');
        if (fallback) {
          fallback.setAttribute('aria-label', title || DEFAULT_TITLE);
        }
        var retry = document.querySelector('[data-warmup-retry]');
        if (retry) {
          retry.hidden = false;
        }
      }

      function isBootResource(target) {
        if (!target || !target.tagName) {
          return false;
        }
        var tagName = target.tagName.toLowerCase();
        return tagName === 'script' || tagName === 'link';
      }

      function bindWarmupFallback() {
        var retry = document.querySelector('[data-warmup-retry]');
        if (retry) {
          retry.addEventListener('click', function() {
            window.location.reload();
          });
        }
        if (navigator.onLine === false) {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        }
      }

      window.__myscouteeWarmup = {
        showNoNetwork: function() {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        },
        showFailure: showWarmupFailure
      };

      window.addEventListener('offline', function() {
        showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
      });
      window.addEventListener('error', function(event) {
        if (isBootResource(event.target)) {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        }
      }, true);
      window.addEventListener('unhandledrejection', function() {
        window.setTimeout(function() {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        }, 0);
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bindWarmupFallback, { once: true });
      } else {
        bindWarmupFallback();
      }
      window.setTimeout(function() {
        showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
      }, FALLBACK_TIMEOUT_MS);
    })();
  </script>
