<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyScoutee</title>
  <meta name="description" content="MyScoutee - Connect with people through shared activities and experiences">
  <link rel="canonical" href="https://myscoutee.com/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MyScoutee">
  <meta property="og:title" content="MyScoutee">
  <meta property="og:description" content="Connect with people through shared activities and experiences.">
  <meta property="og:url" content="https://myscoutee.com/">
  <meta property="og:image" content="https://myscoutee.com/assets/icon/android-chrome-512x512.png">
  <meta property="og:image:secure_url" content="https://myscoutee.com/assets/icon/android-chrome-512x512.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="MyScoutee app icon">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2d5f94">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    html,
    body {
      min-height: 100%;
      background: #f5f6fb;
    }

    app-root {
      display: block;
      min-height: 100vh;
    }

    .app-warmup-fallback {
      position: fixed;
      inset: 0;
      z-index: 9999;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      box-sizing: border-box;
      padding: 1.25rem;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.94) 0%, rgba(245, 247, 253, 0.96) 46%, rgba(239, 244, 255, 0.98) 100%);
      color: #1f3a63;
      font-family: 'Nunito Sans', 'Segoe UI', Roboto, Arial, sans-serif;
      text-align: center;
    }

    .app-bootstrapped .app-warmup-fallback {
      display: none;
    }

    .app-warmup-fallback-mark {
      position: relative;
      width: 76px;
      height: 76px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 18px 34px rgba(36, 65, 110, 0.16);
    }

    .app-warmup-fallback-mark img {
      position: relative;
      z-index: 1;
      width: 46px;
      height: 46px;
      display: block;
      object-fit: contain;
    }

    .app-warmup-fallback-ring {
      position: absolute;
      inset: -5px;
      border-radius: inherit;
      background:
        conic-gradient(from 40deg, #4f7cff 0deg, #7b5cff 120deg, #ff4d8d 230deg, rgba(79, 124, 255, 0.08) 310deg, #4f7cff 360deg);
      animation: app-warmup-spin 0.95s linear infinite;
    }

    .app-warmup-fallback-ring::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: inherit;
      background: #ffffff;
    }

    .app-warmup-fallback-label {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .app-warmup-fallback-status {
      display: none;
      max-width: 22rem;
      color: #37506f;
      font-size: 0.86rem;
      font-weight: 800;
      line-height: 1.38;
    }

    .app-warmup-fallback-retry {
      display: none;
      min-width: 96px;
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      background: #245f9f;
      color: #ffffff;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(36, 95, 159, 0.2);
    }

    .app-warmup-fallback-retry[hidden] {
      display: none;
    }

    .app-warmup-offline .app-warmup-fallback {
      gap: 0.72rem;
    }

    .app-warmup-offline .app-warmup-fallback-ring {
      animation: none;
      background: #d94848;
    }

    .app-warmup-offline .app-warmup-fallback-ring::before {
      content: '!';
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 900;
    }

    .app-warmup-offline .app-warmup-fallback-mark img {
      opacity: 0;
    }

    .app-warmup-offline .app-warmup-fallback-status {
      display: block;
    }

    .app-warmup-offline .app-warmup-fallback-retry:not([hidden]) {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes app-warmup-spin {
      to {
        transform: rotate(1turn);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-warmup-fallback-ring {
        animation-duration: 1.8s;
      }
    }
  </style>
  <script>
    // Restore route after 404 redirect from GitHub Pages
    (function(){
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        history.replaceState(null, '', redirect);
      }
    })();
  </script>
  <script>
    (function(){
      var BOOTSTRAPPED_CLASS = 'app-bootstrapped';
      var OFFLINE_CLASS = 'app-warmup-offline';
      var FALLBACK_TIMEOUT_MS = 9000;
      var WORKER_INSTALL_TIMEOUT_MS = 10000;
      var WORKER_ACTIVATION_TIMEOUT_MS = 4000;
      var DEPLOYMENT_RECOVERY_KEY = 'myscoutee.deployment-recovery.v1';
      var DEFAULT_TITLE = 'No network';
      var DEFAULT_MESSAGE = 'The app cannot finish loading because the server is not reachable.';
      var deploymentRecoveryPromise = null;

      function isBootstrapped() {
        return document.documentElement.classList.contains(BOOTSTRAPPED_CLASS);
      }

      function setText(selector, value) {
        var element = document.querySelector(selector);
        if (element) {
          element.textContent = value;
        }
      }

      function showWarmupFailure(title, message) {
        if (isBootstrapped()) {
          return;
        }
        document.documentElement.classList.add(OFFLINE_CLASS);
        setText('[data-warmup-label]', title || DEFAULT_TITLE);
        setText('[data-warmup-status]', message || DEFAULT_MESSAGE);
        var fallback = document.querySelector('.app-warmup-fallback');
        if (fallback) {
          fallback.setAttribute('aria-label', title || DEFAULT_TITLE);
        }
        var retry = document.querySelector('[data-warmup-retry]');
        if (retry) {
          retry.hidden = false;
        }
      }

      function isBootResource(target) {
        if (!target || !target.tagName) {
          return false;
        }
        var tagName = target.tagName.toLowerCase();
        return tagName === 'script' || tagName === 'link';
      }

      function currentBuildId() {
        var meta = document.querySelector('meta[name="myscoutee-build-id"]');
        return meta && typeof meta.content === 'string' ? meta.content.trim() : '';
      }

      function recoveryWasAttempted(buildId) {
        try {
          return sessionStorage.getItem(DEPLOYMENT_RECOVERY_KEY) === buildId;
        } catch (error) {
          return false;
        }
      }

      function markRecoveryAttempted(buildId) {
        try {
          sessionStorage.setItem(DEPLOYMENT_RECOVERY_KEY, buildId);
        } catch (error) {
          // A blocked sessionStorage should not prevent startup recovery.
        }
      }

      function waitForWaitingWorker(registration) {
        if (registration.waiting) {
          return Promise.resolve(registration.waiting);
        }
        var installingWorker = registration.installing;
        if (!installingWorker) {
          return Promise.resolve(null);
        }
        return new Promise(function(resolve) {
          var settled = false;
          var timeoutId;
          function finish(worker) {
            if (settled) {
              return;
            }
            settled = true;
            window.clearTimeout(timeoutId);
            installingWorker.removeEventListener('statechange', onStateChange);
            resolve(worker);
          }
          function onStateChange() {
            if (registration.waiting) {
              finish(registration.waiting);
              return;
            }
            if (installingWorker.state === 'redundant' || installingWorker.state === 'activated') {
              finish(null);
            }
          }
          timeoutId = window.setTimeout(function() {
            finish(registration.waiting);
          }, WORKER_INSTALL_TIMEOUT_MS);
          installingWorker.addEventListener('statechange', onStateChange);
          onStateChange();
        });
      }

      function activateWaitingWorker(worker) {
        return new Promise(function(resolve) {
          var settled = false;
          var timeoutId;
          function finish() {
            if (settled) {
              return;
            }
            settled = true;
            window.clearTimeout(timeoutId);
            navigator.serviceWorker.removeEventListener('controllerchange', finish);
            resolve();
          }
          timeoutId = window.setTimeout(finish, WORKER_ACTIVATION_TIMEOUT_MS);
          navigator.serviceWorker.addEventListener('controllerchange', finish);
          worker.postMessage({ type: 'SKIP_WAITING' });
        });
      }

      function recoverDeployment(force) {
        if (deploymentRecoveryPromise) {
          return deploymentRecoveryPromise;
        }
        if (isBootstrapped() || navigator.onLine === false || !('serviceWorker' in navigator)) {
          window.location.reload();
          return Promise.resolve();
        }
        var buildId = currentBuildId() || window.location.pathname;
        if (!force && recoveryWasAttempted(buildId)) {
          return Promise.resolve();
        }
        markRecoveryAttempted(buildId);
        showWarmupFailure(
          'Updating MyScoutee',
          'A new app version is being prepared. This page will retry automatically.'
        );
        deploymentRecoveryPromise = navigator.serviceWorker.getRegistration(document.baseURI)
          .then(function(registration) {
            if (!registration) {
              return null;
            }
            return registration.update()
              .catch(function() { return registration; })
              .then(function() { return waitForWaitingWorker(registration); });
          })
          .then(function(waitingWorker) {
            return waitingWorker ? activateWaitingWorker(waitingWorker) : undefined;
          })
          .then(function() {
            window.location.reload();
          })
          .catch(function() {
            deploymentRecoveryPromise = null;
            showWarmupFailure(
              'Unable to update',
              'The new app version is not ready yet. Please wait a moment and retry.'
            );
          });
        return deploymentRecoveryPromise;
      }

      function bindWarmupFallback() {
        var retry = document.querySelector('[data-warmup-retry]');
        if (retry) {
          retry.addEventListener('click', function() {
            deploymentRecoveryPromise = null;
            recoverDeployment(true);
          });
        }
        if (navigator.onLine === false) {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        }
      }

      window.__myscouteeWarmup = {
        showNoNetwork: function() {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        },
        showFailure: showWarmupFailure
      };

      window.addEventListener('offline', function() {
        showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
      });
      window.addEventListener('error', function(event) {
        if (isBootResource(event.target)) {
          recoverDeployment(false);
        }
      }, true);
      window.addEventListener('unhandledrejection', function() {
        window.setTimeout(function() {
          showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
        }, 0);
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bindWarmupFallback, { once: true });
      } else {
        bindWarmupFallback();
      }
      window.setTimeout(function() {
        showWarmupFailure(DEFAULT_TITLE, DEFAULT_MESSAGE);
      }, FALLBACK_TIMEOUT_MS);
    })();
  </script>
</head>
<body>
  <app-root>
    <section class="app-warmup-fallback" role="status" aria-live="polite" aria-label="Loading MyScoutee">
      <span class="app-warmup-fallback-mark">
        <span class="app-warmup-fallback-ring" aria-hidden="true"></span>
        <img src="assets/logo/heart.webp" alt="">
      </span>
      <span class="app-warmup-fallback-label" data-warmup-label>MyScoutee</span>
      <span class="app-warmup-fallback-status" data-warmup-status></span>
      <button class="app-warmup-fallback-retry" type="button" data-warmup-retry hidden>Retry</button>
    </section>
  </app-root>
</body>
</html>
