<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyScoutee</title>
  <meta name="description" content="MyScoutee - Connect with people through shared activities and experiences">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2d5f94">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    // Restore route after 404 redirect from GitHub Pages
    (function(){
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        history.replaceState(null, '', redirect);
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
