<div class="support-popup">
  @if (!feedbackSubmitted) {
    @if (submitErrorMessage(); as errorMessage) {
      <div class="support-submit-error" role="alert">{{ errorMessage }}</div>
    }
    <app-form-flow
      class="support-form-flow"
      [model]="feedbackFlowModel()"
      [ngModel]="feedbackForm"
      [saving]="isSubmitting()"
      [disabled]="isSubmitBusy()"
      (ngModelChange)="onFeedbackFlowValueChange($event)"
    ></app-form-flow>
    <div class="support-actions">
      <app-menu
        class="support-action-menu"
        kind="inline"
        [items]="feedbackActionMenuItems()"
        (itemSelect)="onFeedbackActionMenuSelect($event)"
      ></app-menu>
    </div>
  } @else {
    <article class="support-success-card">
      <div class="support-submit-success">{{ feedbackSubmitMessage }}</div>
    </article>
  }
</div>
