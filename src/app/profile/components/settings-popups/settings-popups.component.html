@if (activePopup() === 'privacy') {
  <app-document-viewer
    [config]="privacyDocumentConfig()"
    (action)="onPrivacyDocumentAction($event)"
  ></app-document-viewer>
} @else if (activePopup() === 'terms') {
  <app-document-viewer
    [config]="termsDocumentConfig()"
  ></app-document-viewer>
} @else if (activePopup() === 'help') {
  <app-document-viewer
    [config]="helpDocumentConfig()"
  ></app-document-viewer>
} @else if (activePopup(); as popup) {
  <section
    class="app-popup profile-settings-popup-shell"
    [class.profile-settings-popup-shell-report-user]="popup === 'report-user'"
    >
    <div class="app-popup-backdrop" (click)="closePopup()"></div>
    <div class="app-popup-panel profile-settings-popup-panel" (click)="$event.stopPropagation()">
      <div class="popup-header">
        <div class="popup-title">
          <h2>
            <span>{{ popupTitle(popup) }}</span>
          </h2>
        </div>
        <button mat-icon-button class="popup-close" (click)="closePopup()" aria-label="Close">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="popup-body">
        @if (popup === 'feedback') {
          <app-profile-feedback-popup></app-profile-feedback-popup>
        }
        @if (popup === 'report-user') {
          <app-profile-report-user-popup></app-profile-report-user-popup>
        }
      </div>
    </div>
  </section>
}
