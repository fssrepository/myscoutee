<a
  *ngIf="href; else buttonItem"
  class="user-settings-item"
  [class.danger]="danger"
  [href]="href"
  [attr.target]="target"
  [attr.rel]="rel"
  (click)="onActivate($event)"
>
  <mat-icon>{{ icon }}</mat-icon>
  <span>{{ label }}</span>
</a>

<ng-template #buttonItem>
  <button type="button" class="user-settings-item" [class.danger]="danger" (click)="onActivate($event)">
    <mat-icon>{{ icon }}</mat-icon>
    <span>{{ label }}</span>
  </button>
</ng-template>
