@if (activePopup(); as popup) {
  <section class="app-popup">
    <div class="app-popup-backdrop" (click)="closePopup()"></div>
    <div class="app-popup-panel navigator-settings-popup-panel" (click)="$event.stopPropagation()">
      <div class="popup-header">
        <div class="popup-title">
          <h2>{{ popupTitle(popup) }}</h2>
        </div>
        <button mat-icon-button class="popup-close" (click)="closePopup()" aria-label="Close">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="popup-body">
        @if (popup === 'help') {
          <app-navigator-help-popup></app-navigator-help-popup>
        }
        @if (popup === 'feedback') {
          <app-navigator-feedback-popup></app-navigator-feedback-popup>
        }
        @if (popup === 'privacy') {
          <app-navigator-privacy-popup></app-navigator-privacy-popup>
        }
        @if (popup === 'report-user') {
          <app-navigator-report-user-popup></app-navigator-report-user-popup>
        }
      </div>
    </div>
  </section>
}
