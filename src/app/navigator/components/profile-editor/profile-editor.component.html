@if (isOpen()) {
  @if (activeUser; as user) {
    <section class="app-popup">
      <div class="app-popup-backdrop" (click)="onBackdropClose()"></div>
      <div
        class="app-popup-panel"
        [class.popup-panel-image-editor]="panel === 'image'"
        [class.popup-panel-profile-editor]="panel === 'profile' || panel === 'experience'"
        (click)="$event.stopPropagation()"
        >
        <div
          class="popup-header"
          [class.popup-header-selector]="panel === 'experience'"
          [class.popup-header-with-back]="panel !== 'profile'"
          >
          @if (panel !== 'profile') {
            <button mat-icon-button class="popup-close popup-back-btn" (click)="handleCloseAction()" aria-label="Back">
              <mat-icon>arrow_back</mat-icon>
            </button>
          }
          <div class="popup-title">
            <h2>{{ popupTitle() }}</h2>
          </div>
          @if (panel === 'profile') {
            <div class="profile-header-actions">
              <app-menu
                kind="inline"
                [items]="profileHeaderActionMenuItems()"
                (itemSelect)="onProfileEditorMenuSelect($event)"
              ></app-menu>
            </div>
            <button mat-icon-button class="popup-close" (click)="handleCloseAction()" aria-label="Close">
              <mat-icon>close</mat-icon>
            </button>
          }
        </div>
        <div
          class="popup-body"
          [class.popup-body-image-editor]="panel === 'image'"
          [class.popup-body-experience]="panel === 'experience'"
          >
          @if (panel === 'profile') {
            @if (activeUserIsAdmin()) {
              <div class="profile-editor-wrap profile-editor-wrap-admin">
                <app-header-card
                  statusClass="status-friends"
                  [admin]="true"
                  [title]="profileEditorData.profile.name || user.name"
                  [meta]="profileEditorData.profile.headline || user.headline || 'Admin workspace'"
                  metaIcon="admin_panel_settings"
                  [imageUrl]="featuredImagePreview"
                  [initials]="user.initials"
                  [gender]="user.gender"
                  badgeLabel="ADMIN"
                  [badgeStyle]="completionBadgeStyle(user.completion)"
                  [showEdit]="true"
                  editAriaLabel="Open image editor"
                  (edit)="openImageEditor()"
                ></app-header-card>
                <div class="profile-editor-scroll-area">
                  <div class="profile-details-structured">
                    <label class="profile-about-field">
                      <div class="profile-about-head">
                        <span>About</span>
                        <small>{{ profileEditorData.profile.about.length }}/160</small>
                      </div>
                      <textarea rows="3" maxlength="160" [(ngModel)]="profileEditorData.profile.about"></textarea>
                    </label>
                    <section class="profile-details-group profile-details-group-basics">
                      <h4>Basics</h4>
                      <div class="profile-form-grid profile-details-form-grid basics-moved-grid admin-profile-details-grid">
                        <label class="name-field">
                          <span>Name</span>
                          <input type="text" [(ngModel)]="profileEditorData.profile.name" />
                        </label>
                        <label class="city-field">
                          <span>Headline</span>
                          <input type="text" [(ngModel)]="profileEditorData.profile.headline" />
                        </label>
                      </div>
                    </section>
                  </div>
                </div>
              </div>
            } @else {
            <div class="profile-editor-wrap">
              <app-header-card
                [statusClass]="profileStatusClass(profileEditorData.profile.profileStatus)"
                [title]="(profileEditorData.profile.name || user.name) + ', ' + profileEditorAge"
                [meta]="profileEditorData.profile.city || user.city"
                metaIcon="location_on"
                [imageUrl]="featuredImagePreview"
                [initials]="user.initials"
                [gender]="user.gender"
                [badgeLabel]="profileCompletionPercent + '%'"
                [badgeStyle]="completionBadgeStyle(profileCompletionPercent)"
                [showEdit]="true"
                editAriaLabel="Open image editor"
                (edit)="openImageEditor()"
              ></app-header-card>
              <div class="profile-editor-flow-area">
                <app-form-flow
                  class="profile-editor-flow"
                  [model]="profileEditorFlowModel"
                  [(ngModel)]="profileEditorData"
                  [saving]="isProfileSaving()"
                  [disabled]="isProfileSaving()"
                  (action)="onProfileEditorFlowAction($event)"
                  (percent)="onProfileCompletionPercentChange($event)"
                ></app-form-flow>
              </div>
            </div>
            }
          }
          <app-menu-outlet (itemSelect)="onProfileEditorDispatchedMenuSelect($event)"></app-menu-outlet>
          @if (panel === 'image') {
            <div class="image-editor-wrap">
              <app-editable-image-carousel
                [previewMode]="true"
                [ngModel]="profileEditorData.profile.images"
                (ngModelChange)="onProfileImagesChange($event)"
                [uploadOwnerId]="user.id"
              ></app-editable-image-carousel>
            </div>
          }
          @if (panel === 'experience') {
            <app-profile-experience-manager
              [ngModel]="profileEditorData.experienceEntries"
              [initialFilter]="experienceFilter"
              [showInlineActions]="true"
              (ngModelChange)="onExperienceEntriesChange($event)"
            ></app-profile-experience-manager>
          }
        </div>
      </div>
    </section>
  }
}
