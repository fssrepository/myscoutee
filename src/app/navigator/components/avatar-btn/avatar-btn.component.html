@if (avatarState(); as avatar) {
  @if (visible()) {
    <div class="navigator-trigger-rail">
      <div class="navigator-trigger-rail-inner">
        <button
          mat-icon-button
          type="button"
          class="user-selector-btn-global"
          [class.is-loading]="isLoading()"
          [class.is-error]="hasLoadError()"
          [class.is-open]="isOpen()"
          [class.is-covered]="isCoveredByAssetPopup()"
          [disabled]="!canToggle()"
          [attr.aria-label]="ariaLabel()"
          [attr.aria-busy]="isLoading()"
          [title]="title()"
          (click)="onToggleMenu()"
          >
          @if (showLoadRing()) {
            <span class="user-selector-load-ring" aria-hidden="true">
              <app-progress-indicator
                kind="action-ring"
                shape="circle"
                [state]="hasLoadError() ? 'error' : 'loading'"
                [durationMs]="3000"
              ></app-progress-indicator>
            </span>
          }
          <span
            class="user-initial"
            [ngClass]="avatarClassList()"
            [style.backgroundImage]="avatarBackgroundImage()"
            >
            @if (isLoading()) {
              <mat-icon>schedule</mat-icon>
            }
            @if (!isLoading() && hasLoadError()) {
              <mat-icon>person_off</mat-icon>
            }
            @if (canToggle() && !avatar.imageUrl) {
              {{ activeUser()?.initials ?? '' }}
            }
          </span>
          @if (canToggle() && badgeCount() > 0) {
            <span class="badge-dot">
              {{ badgeCount() | counterBadge }}
            </span>
          }
        </button>
      </div>
    </div>
  }
}
