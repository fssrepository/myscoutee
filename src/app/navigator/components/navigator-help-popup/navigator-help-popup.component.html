<div class="support-popup support-help-popup">
  <article class="editor-list-card support-help-hero">
    <h4>What you can do in MyScoutee</h4>
    <p>MyScoutee helps you plan events end-to-end: invite people, split into stages/groups, assign resources, and coordinate in context chats.</p>
  </article>

  <div class="support-help-tabs" role="tablist" aria-label="Help topics">
    <button
      type="button"
      class="support-help-tab-btn"
      role="tab"
      *ngFor="let section of sections"
      [class.is-active]="section.id === activeSectionId"
      [attr.aria-selected]="section.id === activeSectionId"
      (click)="selectSection(section.id, $event)"
    >
      <span class="support-help-tab-head">
        <mat-icon>{{ section.icon }}</mat-icon>
        <span>{{ section.title }}</span>
      </span>
      <span class="support-help-tab-blurb">{{ section.blurb }}</span>
    </button>
  </div>

  <article class="editor-list-card support-help-detail" *ngIf="activeSection as section">
    <h4><mat-icon>{{ section.icon }}</mat-icon><span>{{ section.title }}</span></h4>
    <p class="support-help-detail-lead">{{ section.blurb }}</p>
    <p *ngFor="let paragraph of section.details">{{ paragraph }}</p>
    <ul class="support-help-detail-list">
      <li *ngFor="let point of section.points">{{ point }}</li>
    </ul>
  </article>
</div>
