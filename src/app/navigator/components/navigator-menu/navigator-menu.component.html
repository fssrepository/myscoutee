<div class="user-menu-backdrop" [class.open]="open" (click)="onCloseMenu()" *ngIf="open"></div>

<aside class="user-menu-panel" [class.open]="open">
  <div
    class="user-menu-header"
    [ngClass]="profileStatusClass(activeUser.profileStatus)"
  >
    <button
      type="button"
      class="user-menu-settings-btn"
      [class.is-open]="settingsOpen"
      aria-label="Open settings menu"
      [attr.aria-expanded]="settingsOpen"
      (click)="onToggleSettingsMenu($event)"
    >
      <mat-icon>settings</mat-icon>
    </button>

    <button
      type="button"
      class="user-menu-close-btn"
      aria-label="Close menu"
      (click)="$event.stopPropagation(); onCloseMenu()"
    >
      <mat-icon>close</mat-icon>
    </button>

    <div class="user-settings-menu" *ngIf="settingsOpen" (click)="$event.stopPropagation()">
      <button type="button" class="user-settings-item" (click)="onSettingsAction('help', $event)">
        <mat-icon>help_outline</mat-icon>
        <span>Help</span>
      </button>
      <button type="button" class="user-settings-item" (click)="onSettingsAction('send-feedback', $event)">
        <mat-icon>feedback</mat-icon>
        <span>Send Feedback</span>
      </button>
      <a
        class="user-settings-item"
        href="https://github.com/fssrepository/myscoutee/issues"
        target="_blank"
        rel="noopener noreferrer"
        (click)="onCloseSettingsMenu()"
      >
        <mat-icon>bug_report</mat-icon>
        <span>Report Bugs</span>
      </a>
      <button type="button" class="user-settings-item" (click)="onSettingsAction('gdpr', $event)">
        <mat-icon>policy</mat-icon>
        <span>Privacy</span>
      </button>
      <button type="button" class="user-settings-item danger" (click)="onSettingsAction('delete-account', $event)">
        <mat-icon>delete_forever</mat-icon>
        <span>Delete account</span>
      </button>
      <button type="button" class="user-settings-item" (click)="onSettingsAction('logout', $event)">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </div>

    <div class="user-header-main">
      <div class="avatar-stack">
        <span
          class="user-avatar user-avatar-large"
          [ngClass]="['user-color-' + activeUser.gender, featuredImagePreview ? 'has-photo' : '']"
          [style.backgroundImage]="featuredImagePreview ? 'url(' + featuredImagePreview + ')' : null"
        >
          <ng-container *ngIf="!featuredImagePreview">{{ activeUser.initials }}</ng-container>
        </span>
        <span class="avatar-activity-badge" *ngIf="userBadgeCount > 0">{{ userBadgeCount }}</span>
        <span class="avatar-bottom-pill avatar-bottom-pill-header" [ngStyle]="completionBadgeStyle(profileCompletionPercent)">
          <span>{{ profileCompletionPercent }}%</span>
        </span>
      </div>

      <div class="user-meta user-meta-compact">
        <span class="user-name">{{ activeUser.name }}, {{ activeUser.age }}</span>
        <span class="user-city-line">
          <mat-icon>location_on</mat-icon>
          <span>{{ activeUser.city }}</span>
        </span>
      </div>
    </div>
    <button type="button" class="header-open-cue" aria-label="Open profile editor" (click)="openProfileEditor()">
      <mat-icon>edit</mat-icon>
    </button>
  </div>

  <div class="user-menu-content">
    <div class="social-proof-section-head section-personality activities-header impressions-menu-header">
      <span class="section-tag">
        <mat-icon>psychology</mat-icon>
        <span>Impressions</span>
      </span>
      <span class="section-line"></span>
    </div>

    <div class="impressions-shortcuts">
      <button
        class="impression-shortcut-btn impression-shortcut-host-btn"
        [ngClass]="getHostTierToneClass(activeHostTier)"
        type="button"
        (click)="openHostImpressions()"
        aria-label="Open host impressions"
        [title]="activeHostTier"
      >
        <span
          class="card-badge menu-shortcut-badge menu-shortcut-badge-empty"
          *ngIf="hostImpressionsBadge > 0"
        ></span>
        <mat-icon [class]="getHostTierColorClass(activeHostTier)">{{ getHostTierIcon(activeHostTier) }}</mat-icon>
        <span class="impression-shortcut-label">
          <span class="impression-shortcut-main">{{ activeHostTier.replace(' Host', '') }}</span>
          <span class="impression-shortcut-sub">Host</span>
        </span>
      </button>

      <button
        class="impression-shortcut-btn impression-shortcut-member-btn"
        [ngClass]="getTraitToneClass(activeMemberTrait)"
        type="button"
        (click)="openMemberImpressions()"
        aria-label="Open member impressions"
        [title]="memberImpressionTitle"
      >
        <span
          class="card-badge menu-shortcut-badge menu-shortcut-badge-empty"
          *ngIf="memberImpressionsBadge > 0"
        ></span>
        <mat-icon [class]="getTraitColorClass(activeMemberTrait)">{{ getTraitIcon(activeMemberTrait) }}</mat-icon>
        <span class="impression-shortcut-label">
          <span class="impression-shortcut-main">{{ memberImpressionTitle.replace(' Attendee', '') }}</span>
          <span class="impression-shortcut-sub">Attendee</span>
        </span>
      </button>
    </div>

    <div class="social-proof-section-head section-social activities-header">
      <span class="section-tag">
        <mat-icon>local_activity</mat-icon>
        <span>Activities</span>
      </span>
      <span class="section-line"></span>
    </div>

    <div class="menu-shortcuts">
      <button class="menu-shortcut-btn menu-shortcut-rates" type="button" (click)="openRatesShortcut()" aria-label="Open rates" title="Rates">
        <mat-icon>star</mat-icon>
        <span class="menu-shortcut-label">Rates</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="gameBadge > 0">{{ gameBadge }}</span>
      </button>

      <button class="menu-shortcut-btn menu-shortcut-chat" type="button" (click)="openChatShortcut()" aria-label="Open chat" title="Chats">
        <mat-icon>chat</mat-icon>
        <span class="menu-shortcut-label">Chats</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="chatBadge > 0">{{ chatBadge }}</span>
      </button>

      <button class="menu-shortcut-btn menu-shortcut-invitations" type="button" (click)="openInvitationShortcut()" aria-label="Open invitations" title="Invitations">
        <mat-icon>mail</mat-icon>
        <span class="menu-shortcut-label">Invitations</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="invitationsBadge > 0">{{ invitationsBadge }}</span>
      </button>

      <button class="menu-shortcut-btn menu-shortcut-events" type="button" (click)="openEventShortcut()" aria-label="Open events" title="Events">
        <mat-icon>event</mat-icon>
        <span class="menu-shortcut-label">Events</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="eventsBadge > 0">{{ eventsBadge }}</span>
      </button>

      <button class="menu-shortcut-btn menu-shortcut-hosting" type="button" (click)="openHostingShortcut()" aria-label="Open hosting" title="Hosting">
        <mat-icon>stadium</mat-icon>
        <span class="menu-shortcut-label">Hosting</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="hostingBadge > 0">{{ hostingBadge }}</span>
      </button>
    </div>

    <div class="social-proof-section-head section-arts section-assets activities-header impressions-menu-header">
      <span class="section-tag">
        <mat-icon>inventory_2</mat-icon>
        <span>Own Assets</span>
      </span>
      <span class="section-line"></span>
    </div>

    <div class="assets-shortcuts">
      <button class="asset-shortcut-btn asset-shortcut-car" type="button" (click)="openAssetCarPopup()" aria-label="Car">
        <mat-icon>directions_car</mat-icon>
        <span class="asset-shortcut-label">Car</span>
      </button>
      <button class="asset-shortcut-btn asset-shortcut-accommodation" type="button" (click)="openAssetAccommodationPopup()" aria-label="Accommodation">
        <mat-icon>apartment</mat-icon>
        <span class="asset-shortcut-label">Accommodation</span>
      </button>
      <button class="asset-shortcut-btn asset-shortcut-supplies" type="button" (click)="openAssetSuppliesPopup()" aria-label="Supplies">
        <mat-icon>inventory_2</mat-icon>
        <span class="asset-shortcut-label">Supplies</span>
      </button>
      <button class="asset-shortcut-btn asset-shortcut-ticket" type="button" (click)="openAssetTicketsPopup()" aria-label="Ticket">
        <mat-icon>qr_code_2</mat-icon>
        <span class="asset-shortcut-label">Ticket</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="assetTicketsBadge > 0">{{ assetTicketsBadge }}</span>
      </button>
    </div>

    <div class="social-proof-section-head section-feedback activities-header impressions-menu-header">
      <span class="section-tag">
        <mat-icon>rate_review</mat-icon>
        <span>Feedback</span>
      </span>
      <span class="section-line"></span>
    </div>

    <div class="feedback-shortcuts">
      <button class="feedback-shortcut-btn feedback-shortcut-event" type="button" (click)="openEventFeedbackPopup($event)" aria-label="Open event feedback" title="Event Feedback">
        <mat-icon>rate_review</mat-icon>
        <span class="feedback-shortcut-label">Event Feedback</span>
        <span class="card-badge menu-shortcut-badge" *ngIf="eventFeedbackBadge > 0">{{ eventFeedbackBadge }}</span>
      </button>
      <button class="feedback-shortcut-btn feedback-shortcut-report" type="button" (click)="openReportUserFromFeedback($event)" aria-label="Open report user" title="Report User">
        <mat-icon>flag</mat-icon>
        <span class="feedback-shortcut-label">Report User</span>
      </button>
    </div>
  </div>
</aside>
