<section class="experience-form-overlay asset-form-overlay" *ngIf="visible">
  <div class="experience-form-overlay-backdrop" (click)="close()"></div>
  <div class="experience-form-popup asset-form-popup" (click)="$event.stopPropagation()">
    <div class="experience-form-header">
      <h3>{{ title }}</h3>
      <div class="experience-form-header-controls">
        <button type="button" class="popup-header-add-btn subevent-leaderboard-save-btn" (click)="save()" aria-label="Save asset">
          <mat-icon>done</mat-icon>
        </button>
        <button type="button" class="experience-form-close-btn" (click)="close()" aria-label="Close asset form">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>
    <section class="experience-form-panel" [ngClass]="eventVisibilityClass(assetFormVisibility)">
      <div class="experience-form-grid">
        <label>
          <span>Type</span>
          <div class="profile-status-select-wrap selector-like experience-type-select" [ngClass]="assetTypeClass(assetForm.type)">
            <mat-select [(ngModel)]="assetForm.type" disableOptionCentering panelClass="selector-options-panel profile-bottom-sheet-panel asset-type-options-panel">
              <mat-select-trigger>
                <span class="status-option-content">
                  <mat-icon [class]="assetTypeClass(assetForm.type)">{{ assetTypeIcon(assetForm.type) }}</mat-icon>
                  <span>{{ assetForm.type }}</span>
                </span>
              </mat-select-trigger>
              <mat-option *ngFor="let option of assetTypeOptions" [value]="option" class="status-option" [ngClass]="assetTypeClass(option)">
                <span class="status-option-content">
                  <mat-icon [class]="assetTypeClass(option)">{{ assetTypeIcon(option) }}</mat-icon>
                  <span>{{ option }}</span>
                </span>
              </mat-option>
            </mat-select>
          </div>
        </label>
        <label>
          <span>Title</span>
          <input type="text" [(ngModel)]="assetForm.title" />
        </label>
        <label>
          <span>Subtitle</span>
          <input type="text" [(ngModel)]="assetForm.subtitle" />
        </label>
        <label>
          <span>Total capacity</span>
          <input type="number" min="1" step="1" [(ngModel)]="assetForm.capacityTotal" />
        </label>
        <label class="experience-description-field">
          <span>Details</span>
          <textarea rows="3" [(ngModel)]="assetForm.details"></textarea>
        </label>
        <label class="experience-description-field" *ngIf="assetForm.type === 'Accommodation'">
          <span>Location</span>
          <div class="asset-route-row asset-route-row-inline">
            <input
              type="text"
              [ngModel]="assetFormRouteStops[0]"
              (ngModelChange)="setAssetFormRouteStop(0, $event)"
              placeholder="Accommodation address"
            />
            <button
              type="button"
              class="experience-action-btn asset-route-map-btn"
              (click)="openAssetFormRouteStopMap(0, $event)"
              aria-label="Open location on map"
            >
              <mat-icon>location_on</mat-icon>
            </button>
          </div>
        </label>
        <label class="experience-description-field">
          <span>Source link</span>
          <div class="asset-source-row">
            <input type="text" [(ngModel)]="assetForm.sourceLink" placeholder="https://..." />
            <button
              *ngIf="sourceRefreshEnabled"
              type="button"
              class="asset-source-refresh-btn"
              (click)="refreshAssetFromSourceLink()"
              aria-label="Refresh from source"
            >
              <mat-icon>refresh</mat-icon>
            </button>
          </div>
        </label>
        <label class="experience-description-field">
          <span>Image</span>
          <input #assetImageInput type="file" accept="image/*" hidden (change)="onImageFileChange($event)" />
          <button type="button" class="asset-image-dropzone" (click)="assetImageInput.click()">
            <div class="asset-image-preview" [style.backgroundImage]="assetForm.imageUrl ? 'url(' + assetForm.imageUrl + ')' : null">
              <span class="asset-image-plus" *ngIf="!isEventEditorReadOnly">+</span>
            </div>
          </button>
        </label>
      </div>
    </section>
  </div>
</section>
