<div class="asset-popup">
  <section class="app-popup" *ngIf="ownedAssets.isPopupOpen()">
    <div class="app-popup-backdrop" (click)="ownedAssets.closePopup()"></div>
    <div class="app-popup-panel popup-panel-assets" (click)="$event.stopPropagation()">
      <div class="popup-header popup-header-with-progress">
        <div class="popup-title">
          <h2>{{ ownedAssets.popupTitle() }}</h2>
          <p class="popup-subtitle-activities" *ngIf="ownedAssets.isTicketPopup()">{{ assetPopup.ticketHeaderSummary() }}</p>
        </div>
        <div class="ticket-order-picker" *ngIf="ownedAssets.isTicketPopup()">
          <button
            type="button"
            class="popup-view-fab ticket-order-trigger"
            (click)="assetPopup.toggleTicketOrderPicker($event)"
            aria-label="Open ticket date ordering"
          >
            <mat-icon>{{ assetPopup.ticketDateOrderIcon() }}</mat-icon>
            <span>{{ assetPopup.ticketDateOrderLabel() }}</span>
          </button>
          <div class="activities-view-picker-panel event-explore-order-panel" *ngIf="assetPopup.showTicketOrderPicker()">
            <button type="button" class="activities-view-option" (click)="assetPopup.selectTicketDateOrder('upcoming', $event)">
              <mat-icon>schedule</mat-icon>
              <span>Upcoming</span>
            </button>
            <button type="button" class="activities-view-option" (click)="assetPopup.selectTicketDateOrder('past', $event)">
              <mat-icon>history</mat-icon>
              <span>Past</span>
            </button>
          </div>
        </div>
        <button mat-icon-button class="popup-close" (click)="ownedAssets.closePopup()" aria-label="Close">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="popup-body popup-body-assets-list" [class.popup-body-assets-tickets]="ownedAssets.isTicketPopup()" [class.popup-body-assets-assign]="isSubEventAssetAssignPopup()">
        <div class="experience-popup assets-popup assets-popup-smart-list" [class.assets-popup-tickets]="ownedAssets.isTicketPopup()" [class.assets-popup-assign]="isSubEventAssetAssignPopup()">
          <div class="experience-toolbar assets-toolbar">
            <div
              class="profile-status-select-wrap selector-like experience-filter-select assets-compact-select"
              [ngClass]="ownedAssets.assetTypeClass(ownedAssets.assetFilter)"
              [class.asset-filter-open]="assetFilterOpen()"
            >
              <mat-select
                [ngModel]="ownedAssets.assetFilter"
                (ngModelChange)="onAssetFilterChange($event)"
                (openedChange)="onAssetFilterMenuOpenChange($event)"
                [panelWidth]="ownedAssets.assetFilterPanelWidth()"
                disableOptionCentering
                panelClass="selector-options-panel profile-bottom-sheet-panel assets-filter-options-panel"
              >
                <mat-select-trigger>
                  <span class="status-option-content">
                    <mat-icon [class]="ownedAssets.assetTypeClass(ownedAssets.assetFilter)">{{ ownedAssets.assetTypeIcon(ownedAssets.assetFilter) }}</mat-icon>
                    <span>{{ ownedAssets.assetFilter }}</span>
                  </span>
                </mat-select-trigger>
                <mat-option *ngFor="let option of ownedAssets.assetFilterOptions" [value]="option" class="status-option" [ngClass]="ownedAssets.assetTypeClass(option)">
                  <span class="status-option-content">
                    <mat-icon [class]="ownedAssets.assetTypeClass(option)">{{ ownedAssets.assetTypeIcon(option) }}</mat-icon>
                    <span>{{ option }}</span>
                  </span>
                </mat-option>
              </mat-select>
            </div>
            <button
              type="button"
              class="popup-header-add-btn assets-add-btn"
              *ngIf="!ownedAssets.isTicketPopup() && !isSubEventAssetAssignPopup()"
              (click)="ownedAssets.openAssetForm()"
              aria-label="Add asset"
            >
              <mat-icon>add</mat-icon>
            </button>
            <button
              type="button"
              class="popup-header-add-btn assets-add-btn ticket-toolbar-scanner-btn"
              *ngIf="ownedAssets.isTicketPopup()"
              (click)="assetPopup.openTicketScannerPopup($event)"
              aria-label="Scan ticket"
            >
              <mat-icon>qr_code_scanner</mat-icon>
              <span>Scan Ticket</span>
            </button>
          </div>

          <app-smart-list
            *ngIf="ownedAssets.isTicketPopup(); else defaultAssetCardList"
            [config]="ticketSmartListConfig"
            [loadPage]="ticketSmartListLoadPage"
            [itemTemplate]="ticketItemTemplate"
            [query]="ticketSmartListQuery"
            (stateChange)="onTicketSmartListStateChange($event)"
          ></app-smart-list>

          <ng-template #defaultAssetCardList>
            <app-smart-list
              [config]="assetSmartListConfig"
              [loadPage]="assetSmartListLoadPage"
              [itemTemplate]="assetItemTemplate"
              [query]="assetSmartListQuery"
            ></app-smart-list>
          </ng-template>

          <app-asset-form-popup
            [visible]="ownedAssets.showAssetForm"
            [title]="ownedAssets.assetFormTitle()"
            [assetForm]="ownedAssets.assetForm"
            [assetFormVisibility]="ownedAssets.assetFormVisibility"
            [assetTypeOptions]="ownedAssets.assetTypeOptions"
            [assetFormRouteStops]="ownedAssets.assetFormRouteStops()"
            [isEventEditorReadOnly]="false"
            [assetTypeClass]="ownedAssets.assetTypeClass"
            [assetTypeIcon]="ownedAssets.assetTypeIcon"
            [eventVisibilityClass]="ownedAssets.eventVisibilityClass"
            [close]="closeOwnedAssetForm"
            [save]="saveOwnedAssetCard"
            [setAssetFormRouteStop]="setOwnedAssetFormRouteStop"
            [openAssetFormRouteStopMap]="openOwnedAssetFormRouteStopMap"
            [refreshAssetFromSourceLink]="refreshOwnedAssetFromSourceLink"
            [onAssetImageFileSelected]="onOwnedAssetImageFileSelected"
          ></app-asset-form-popup>

          <app-asset-delete-confirm
            [visible]="!!ownedAssets.pendingAssetDeleteCardId"
            [label]="ownedAssets.pendingAssetDeleteLabel()"
            [cancel]="cancelOwnedAssetDelete"
            [confirm]="confirmOwnedAssetDelete"
          ></app-asset-delete-confirm>
        </div>
      </div>
    </div>
  </section>

  <ng-template #ticketItemTemplate let-row let-groupLabel="groupLabel">
    <app-info-card
      [card]="ticketInfoCard(row, { groupLabel: groupLabel })"
      (mediaEndClick)="assetPopup.openTicketCodePopup(row)"
    ></app-info-card>
  </ng-template>

  <ng-template #assetItemTemplate let-card let-groupLabel="groupLabel">
    <app-info-card
      [card]="ownedAssetInfoCard(card, { groupLabel: groupLabel, selectionMode: isSubEventAssetAssignPopup(), selected: isSubEventAssetAssignCardSelected(card.id) })"
      (mediaStartClick)="openOwnedAssetMap(card)"
      (mediaEndClick)="isSubEventAssetAssignPopup() ? toggleSubEventAssetAssignCard(card.id) : null"
      (menuAction)="onOwnedAssetInfoCardMenuAction(card, $event)"
    ></app-info-card>
  </ng-template>

  <section class="app-popup app-popup-stacked" *ngIf="assetPopup.ticketOverlayMode() === 'ticketCode' || assetPopup.ticketOverlayMode() === 'ticketScanner'">
    <div class="app-popup-backdrop" (click)="assetPopup.closeTicketOverlay()"></div>
    <div
      class="app-popup-panel"
      [class.popup-panel-ticket-fullscreen]="(assetPopup.ticketOverlayMode() === 'ticketCode' || assetPopup.ticketOverlayMode() === 'ticketScanner') && ownedAssets.isMobileView()"
      (click)="$event.stopPropagation()"
    >
      <div class="popup-header">
        <div class="popup-title">
          <h2>{{ assetPopup.ticketOverlayMode() === 'ticketCode' ? 'Ticket' : 'Scan Ticket' }}</h2>
        </div>
        <button mat-icon-button class="popup-close" (click)="assetPopup.closeTicketOverlay()" aria-label="Close">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="popup-body">
        <app-asset-ticket-code-popup
          *ngIf="assetPopup.ticketOverlayMode() === 'ticketCode'"
          [selectedTicketRow]="assetPopup.selectedTicketRow()"
          [avatarUrl]="assetPopup.ticketCodeAvatarUrl()"
          [initials]="assetPopup.ticketCodeInitials()"
          [personLine]="assetPopup.ticketCodePersonLine()"
          [roleEventLine]="assetPopup.ticketCodeRoleEventLine()"
          [dateLine]="assetPopup.ticketCodeDateLine()"
          [qrImageUrl]="assetPopup.ticketQrImageUrl()"
        ></app-asset-ticket-code-popup>

        <app-asset-ticket-scanner-popup
          *ngIf="assetPopup.ticketOverlayMode() === 'ticketScanner'"
          [state]="assetPopup.ticketScannerState()"
          [result]="assetPopup.ticketScannerResult()"
          [avatarUrl]="assetPopup.ticketScannerResultAvatarUrl()"
          [initials]="assetPopup.ticketScannerResultInitials()"
          [personLine]="assetPopup.ticketScannerPersonLine()"
          [roleEventLine]="assetPopup.ticketScannerRoleEventLine()"
          [dateLine]="assetPopup.ticketScannerDateLine()"
          [retry]="retryTicketScanner"
          (videoElementChange)="onTicketScannerVideoElementChange($event)"
        ></app-asset-ticket-scanner-popup>
      </div>
      <app-asset-basket-popup *ngIf="assetPopup.host() as host" [host]="host"></app-asset-basket-popup>
    </div>
  </section>

  <app-asset-member-picker-popup></app-asset-member-picker-popup>
</div>
