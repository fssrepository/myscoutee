@if (assetStore.showAssetForm()) {
  <app-popup [model]="assetEditorPopupModel()" [zIndex]="assetEditorPopupZIndex()">
    @if (isLoading) {
      <div class="popup-loading-overlay" aria-busy="true">
        <app-indicator
          kind="load-ring"
          state="loading"
        ></app-indicator>
      </div>
    } @else {
      <app-form-flow
        class="asset-editor-flow"
        [class.is-saving]="isSavePending"
        [model]="assetEditorFlowModel()"
        [(ngModel)]="assetEditorFlowBinding"
        [disabled]="assetEditorReadOnly()"
        [saving]="isSavePending"
      ></app-form-flow>
    }
  </app-popup>
}
