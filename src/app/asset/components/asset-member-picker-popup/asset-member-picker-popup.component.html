@if (isOpen) {
  <section class="app-popup app-popup-stacked app-popup-super-stacked asset-member-picker-popup-shell">
    <div class="app-popup-backdrop" (click)="closeInvitePopup()"></div>
    <div
      class="app-popup-panel popup-panel-friends-picker popup-panel-friends-picker-members popup-panel-wide popup-panel-full-height"
      (click)="$event.stopPropagation()"
      >
      <div class="popup-header popup-header-friends-picker">
        <div class="popup-title">
          <h2>Invite members</h2>
          @if (title && title !== 'Invite members') {
            <p>{{ title }}</p>
          }
        </div>
        <div class="popup-header-mobile-status-row">
          <app-menu
            class="asset-member-picker-sort-menu"
            kind="select"
            [trigger]="inviteSortMenuTrigger()"
            [items]="inviteSortMenuItems()"
            (itemSelect)="onInviteMenuSelect($event)"
          ></app-menu>
        </div>
        <div class="popup-header-mobile-actions-row">
          @if (selectedInviteCount() > 0) {
            <span class="header-members-count asset-member-picker-header-count">{{ selectedInviteCountLabel() }}</span>
          }
          <app-menu
            class="asset-member-picker-confirm-menu"
            kind="button-row"
            [items]="inviteConfirmMenuItems()"
            (itemSelect)="onInviteMenuSelect($event)"
          ></app-menu>
          <button type="button" class="popup-close" (click)="closeInvitePopup($event)" aria-label="Close">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
      <div class="popup-body popup-body-friends-picker">
        <app-basket
          className="friends-picker-chip-row asset-member-picker-chip-row"
          [chips]="selectedInviteBasketChips()"
          [disabled]="isConfirmPending"
          (chipClick)="toggleInviteCandidate($event.chip.id, $event.event)"
        ></app-basket>
        @if (confirmErrorMessage) {
          <p class="asset-member-picker-confirm-error">{{ confirmErrorMessage }}</p>
        }
        <app-smart-list
          #inviteSmartList
          class="asset-member-picker-smart-list"
          [config]="inviteSmartListConfig"
          [loaders]="inviteSmartListLoaders"
          [itemTemplate]="inviteItemTemplateRef ?? null"
          [query]="inviteSmartListQuery"
          (stateChange)="onInviteSmartListStateChange($event)"
        ></app-smart-list>
        <ng-template #inviteItemTemplate let-candidate>
          <article class="experience-item-card friends-picker-card asset-invite-candidate-card" [appLazyBgImage]="candidate.avatarUrl">
            <span class="friends-picker-card-avatar-fallback" aria-hidden="true">
              <mat-icon>highlight_off</mat-icon>
            </span>
            <button
              type="button"
              class="friends-picker-card-view-btn"
              [disabled]="isConfirmPending"
              (click)="viewCandidateProfile(candidate, $event)"
              aria-label="View profile"
              >
              <mat-icon>visibility</mat-icon>
            </button>
            <button
              type="button"
              class="friends-picker-card-add-btn"
              [class.active]="isInviteCandidateSelected(candidate.userId)"
              [class.is-persisted]="isInviteCandidatePersisted(candidate.userId)"
              [disabled]="isConfirmPending"
              (click)="toggleInviteCandidate(candidate.userId, $event)"
              [attr.aria-label]="isInviteCandidateSelected(candidate.userId) ? 'Unselect friend' : 'Select friend'"
              >
              <mat-icon>{{ isInviteCandidateSelected(candidate.userId) ? 'check' : 'add' }}</mat-icon>
            </button>
            <div class="friends-picker-card-meta">
              <h4>{{ candidate.name }}</h4>
              <p>{{ inviteMetLabel(candidate) }}</p>
            </div>
          </article>
        </ng-template>
      </div>
    </div>
  </section>
}
