<section class="app-popup app-popup-stacked app-popup-super-stacked app-popup-super-stacked-over-subevents asset-basket-popup-shell" *ngIf="host.isSubEventAssetAssignPopup()">
  <div class="app-popup-backdrop" (click)="host.closeSubEventAssetAssignPopup()"></div>
  <div class="app-popup-panel popup-panel-friends-picker popup-panel-friends-picker-members popup-panel-subevent-asset-assign" (click)="$event.stopPropagation()">
    <div class="popup-header popup-header-friends-picker">
      <div class="popup-title popup-title-members">
        <div class="popup-chat-title-block">
          <h2>{{ host.subEventAssetAssignHeaderTitle() }}</h2>
          <p>{{ host.subEventAssetAssignHeaderSubtitle() }}</p>
        </div>
      </div>
      <div class="popup-header-inline-controls">
        <button
          type="button"
          class="popup-header-add-btn subevent-leaderboard-save-btn"
          [class.form-save-invalid]="!host.canConfirmSubEventAssetAssignSelection()"
          [disabled]="!host.canConfirmSubEventAssetAssignSelection()"
          (click)="host.confirmSubEventAssetAssignSelection($event)"
          aria-label="Assign selected assets"
        >
          <mat-icon>done</mat-icon>
        </button>
        <button mat-icon-button class="popup-close" (click)="host.closeSubEventAssetAssignPopup()" aria-label="Close">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>
    <div class="popup-body popup-body-friends-picker popup-body-subevent-asset-assign">
      <div class="friends-picker-chip-row" *ngIf="host.selectedSubEventAssetAssignChips().length > 0">
        <button
          type="button"
          class="values-selected-chip friends-picker-chip subevent-asset-assign-chip"
          *ngFor="let chip of host.selectedSubEventAssetAssignChips()"
          (click)="host.toggleSubEventAssetAssignCard(chip.id, $event)"
        >
          <mat-icon>{{ host.assetTypeIcon(chip.type) }}</mat-icon>
          <span>{{ chip.title }}</span>
          <mat-icon class="friends-picker-chip-remove">close</mat-icon>
        </button>
      </div>
      <div class="experience-card-list assets-card-list subevent-asset-assign-list">
        <article class="experience-item-card asset-item-card subevent-asset-assign-card" [ngClass]="host.assetTypeClass(card.type)" *ngFor="let card of host.subEventAssetAssignCandidates()">
          <div class="asset-card-image" [appLazyBgImage]="card.imageUrl">
            <a class="asset-source-icon" [href]="card.sourceLink" target="_blank" rel="noopener" (click)="$event.stopPropagation()" aria-label="Open source link">
              <mat-icon>link</mat-icon>
            </a>
            <button
              type="button"
              class="friends-picker-card-add-btn subevent-asset-assign-select-btn"
              [class.active]="host.isSubEventAssetAssignCardSelected(card.id)"
              (click)="host.toggleSubEventAssetAssignCard(card.id, $event)"
              aria-label="Select asset"
            >
              <mat-icon>{{ host.isSubEventAssetAssignCardSelected(card.id) ? 'check' : 'add' }}</mat-icon>
            </button>
          </div>
          <div class="experience-item-head">
            <span class="experience-item-icon">
              <mat-icon>{{ host.assetTypeIcon(card.type) }}</mat-icon>
            </span>
            <div class="experience-item-meta">
              <h4>{{ card.title }}</h4>
              <p>{{ card.type }} · {{ card.subtitle }} · {{ card.city }}</p>
            </div>
          </div>
          <p class="experience-item-description">{{ card.details }}</p>
        </article>
      </div>
    </div>
  </div>
</section>
