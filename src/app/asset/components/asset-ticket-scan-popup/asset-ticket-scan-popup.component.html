@if (visible()) {
  <app-popup [model]="ticketScanPopupModel()" [zIndex]="ticketScanPopupZIndex()">
    @if (store.ticketScanMode() === 'ticketCode') {
      <app-asset-ticket-code-popup
        [selectedTicketRow]="store.selectedTicketRow()"
        [avatarUrl]="ticketCodeView().avatarUrl"
        [initials]="ticketCodeView().initials"
        [personLine]="ticketCodeView().personLine"
        [roleEventLine]="ticketCodeView().roleEventLine"
        [dateLine]="ticketCodeView().dateLine"
        [qrImageUrl]="ticketQrImageUrl()"
      ></app-asset-ticket-code-popup>
    }
    @if (store.ticketScanMode() === 'ticketScanner') {
      <app-asset-ticket-scanner-popup
        [state]="store.ticketScannerState()"
        [result]="store.ticketScannerResult()"
        [avatarUrl]="ticketScannerView().avatarUrl"
        [initials]="ticketScannerView().initials"
        [personLine]="ticketScannerView().personLine"
        [roleEventLine]="ticketScannerView().roleEventLine"
        [dateLine]="ticketScannerView().dateLine"
        [retry]="retryTicketScanner"
        (videoElementChange)="onTicketScannerVideoElementChange($event)"
      ></app-asset-ticket-scanner-popup>
    }
  </app-popup>
}
