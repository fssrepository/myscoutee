<section class="experience-delete-confirm" *ngIf="visible">
  <div class="experience-delete-confirm-backdrop" (click)="cancel()"></div>
  <div class="experience-delete-confirm-panel">
    <h4>Delete asset</h4>
    <p>{{ label }}</p>
    <div class="popup-actions">
      <button type="button" class="link-btn neutral-btn" (click)="cancel()">Cancel</button>
      <button type="button" class="link-btn experience-delete-btn" (click)="confirm()">Delete</button>
    </div>
  </div>
</section>
