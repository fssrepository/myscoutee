@if (error) {
  <section class="admin-help-session-error" role="alert">
    <div class="admin-help-session-error__panel">
      <p>{{ error }}</p>
      <div class="admin-help-session-error__actions">
        <button type="button" (click)="retry()">Try again</button>
        <button type="button" (click)="goAdmin()">Admin</button>
      </div>
    </div>
  </section>
}

@if (demoBootstrapSelector()) {
  @if (demoBootstrapSelectorComponent(); as component) {
    <ng-container *ngComponentOutlet="component"></ng-container>
  }
}
