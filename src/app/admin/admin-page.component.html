@if (admin.dashboard(); as dashboard) {
  <section class="admin-workspace">
    <div class="admin-home-panel">
      <header class="admin-home-header">
        <a class="admin-brand" aria-label="MyScoutee admin">
          <img class="admin-brand-mark" src="assets/logo/heart.webp" alt="MyScoutee logo" />
          <span class="admin-brand-text">yScoutee</span>
        </a>
        <div class="admin-home-title">
          <span>Admin</span>
          <h1>{{ dashboard.activeAdmin.name }}</h1>
        </div>
      </header>

      <section class="admin-home-grid">
        <button type="button" class="admin-home-card admin-home-card-reports" matRipple (click)="admin.openReports()">
          <span class="admin-home-card-icon"><mat-icon>report</mat-icon></span>
          <span class="admin-home-card-copy">
            <strong>Reports</strong>
            <span>{{ dashboard.reportedUsers.length }} reported users</span>
          </span>
        </button>
        <button type="button" class="admin-home-card admin-home-card-feedback" matRipple (click)="admin.openFeedback()">
          <span class="admin-home-card-icon"><mat-icon>feedback</mat-icon></span>
          <span class="admin-home-card-copy">
            <strong>Application feedback</strong>
            <span>{{ dashboard.feedback.length }} messages</span>
          </span>
        </button>
        <button type="button" class="admin-home-card admin-home-card-chat" matRipple (click)="admin.openChat()">
          <span class="admin-home-card-icon"><mat-icon>chat</mat-icon></span>
          <span class="admin-home-card-copy">
            <strong>Chats</strong>
            <span>Support and moderation conversations</span>
          </span>
        </button>
      </section>
    </div>

    <app-navigator></app-navigator>
    <app-admin-reports-popup></app-admin-reports-popup>
    <app-admin-feedback-popup></app-admin-feedback-popup>
    <app-admin-chat-review-popup></app-admin-chat-review-popup>
    <app-admin-item-preview-popup></app-admin-item-preview-popup>
    <app-confirmation-dialog></app-confirmation-dialog>
  </section>
} @else {
  <section class="admin-entry-shell">
    <div class="admin-entry-panel">
      <header class="admin-entry-header">
        <a class="admin-brand" aria-label="MyScoutee admin landing">
          <img class="admin-brand-mark" src="assets/logo/heart.webp" alt="MyScoutee logo" />
          <span class="admin-brand-text">yScoutee</span>
        </a>
          <button
            type="button"
            class="admin-login-btn"
            matRipple
            [matRippleColor]="'rgba(255, 255, 255, 0.2)'"
            (click)="requestAdminLogin()"
          >
          <mat-icon>{{ admin.isFirebaseAdminMode ? 'login' : 'group' }}</mat-icon>
          <span>Admin login</span>
        </button>
      </header>
      <section class="admin-entry-hero">
        <p class="admin-eyebrow">MyScoutee admin</p>
        <h1>Moderation workspace</h1>
        <p class="admin-entry-lead">Review reported users, support chats, and application feedback with the same app tools.</p>
        @if (admin.error()) {
          <p class="admin-entry-error">{{ admin.error() }}</p>
        }
      </section>
    </div>
  </section>

  <app-entry-demo-user-selector
    [open]="selectorOpen"
    [title]="'Select admin user'"
    [subtitle]="'Login disabled mode. Choose an admin user to seed moderation data.'"
    [loading]="selectorLoading"
    [loadingProgress]="selectorLoadingProgress"
    [loadingLabel]="selectorLoadingLabel"
    [loadingStage]="selectorLoadingStage"
    [errorMessage]="selectorErrorMessage"
    [submitting]="selectorSubmitting"
    [users]="admin.adminUsers()"
    (closeRequested)="closeSelector()"
    (retryRequested)="retrySelector()"
    (userSelected)="onSelectAdminUser($event)"
  ></app-entry-demo-user-selector>
}
