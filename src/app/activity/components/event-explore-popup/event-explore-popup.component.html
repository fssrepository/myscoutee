<section class="app-popup event-explore-popup-shell" *ngIf="isOpen">
  <div class="app-popup-backdrop" (click)="closeEventExplore()"></div>
  <div class="app-popup-panel popup-panel-event-explore popup-panel-wide popup-panel-full-height" (click)="$event.stopPropagation()">
    <div class="popup-header popup-header-with-progress">
      <div class="popup-title">
        <h2>{{ eventExploreHeaderTitle() }}</h2>
      </div>

      <div class="event-explore-header-controls">
        <div class="event-explore-order-picker">
          <button
            type="button"
            class="popup-view-fab event-explore-order-trigger"
            [ngClass]="eventExploreOrderClass()"
            (click)="toggleEventExploreOrderPicker($event)"
            aria-label="Open event explore order"
          >
            <mat-icon [class]="eventExploreOrderClass()">{{ eventExploreOrderIcon() }}</mat-icon>
            <span>{{ eventExploreOrderLabel() }}</span>
          </button>
          <div class="activities-view-picker-panel event-explore-order-panel" *ngIf="showOrderPicker">
            <button
              type="button"
              class="activities-view-option"
              [ngClass]="eventExploreOrderClass(option.key)"
              *ngFor="let option of eventExploreOrderOptions"
              (click)="selectEventExploreOrder(option.key, $event)"
            >
              <mat-icon [class]="eventExploreOrderClass(option.key)">{{ option.icon }}</mat-icon>
              <span>{{ option.label }}</span>
            </button>
          </div>
        </div>

        <div class="event-explore-view-picker">
          <button
            type="button"
            class="popup-view-fab event-explore-view-trigger"
            [ngClass]="eventExploreCurrentViewClass()"
            (click)="toggleEventExploreViewPicker($event)"
            aria-label="Open event explore view"
          >
            <mat-icon [class]="eventExploreCurrentViewClass()">{{ eventExploreCurrentViewIcon() }}</mat-icon>
            <span>{{ eventExploreCurrentViewLabel() }}</span>
          </button>
          <div class="activities-view-picker-panel event-explore-order-panel" *ngIf="showViewPicker">
            <button
              type="button"
              class="activities-view-option"
              [ngClass]="eventExploreCurrentViewClass(option.key)"
              *ngFor="let option of eventExploreViewOptions"
              (click)="selectEventExploreView(option.key, $event)"
            >
              <mat-icon [class]="eventExploreCurrentViewClass(option.key)">{{ option.icon }}</mat-icon>
              <span>{{ option.label }}</span>
            </button>
          </div>
        </div>
      </div>

      <button type="button" class="popup-close" (click)="closeEventExplore()" aria-label="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="popup-body popup-body-event-explore">
      <div class="event-explore-popup">
        <div class="event-explore-filter-bar popup-filter-bar">
          <button
            type="button"
            class="popup-view-fab event-explore-filter-btn event-explore-filter-friends"
            [class.is-active]="eventExploreFilterFriendsOnly"
            (click)="toggleEventExploreFriendsOnly($event)"
          >
            <mat-icon>groups</mat-icon>
            <span>Friends going</span>
          </button>

          <button
            type="button"
            class="popup-view-fab event-explore-filter-btn event-explore-filter-rooms"
            [class.is-active]="eventExploreFilterHasRooms"
            (click)="toggleEventExploreHasRooms($event)"
          >
            <mat-icon>hotel</mat-icon>
            <span>Open spots</span>
          </button>

          <div class="event-explore-topic-filter">
            <button
              type="button"
              class="popup-view-fab event-explore-filter-btn event-explore-filter-topic"
              [class.is-active]="!!eventExploreFilterTopic"
              (click)="toggleEventExploreTopicPicker($event)"
            >
              <mat-icon>sell</mat-icon>
              <span>{{ eventExploreTopicFilterLabel() }}</span>
              <mat-icon class="event-explore-topic-filter-arrow">{{ showTopicPicker ? 'expand_less' : 'chevron_right' }}</mat-icon>
            </button>
          </div>
        </div>

        <app-smart-list
          #eventExploreSmartList
          [config]="eventExploreSmartListConfig"
          [loadPage]="eventExploreLoadPage"
          [itemTemplate]="eventExploreItemTemplateRef ?? null"
          [query]="eventExploreSmartListQuery"
          (stateChange)="onEventExploreSmartListStateChange($event)"
        ></app-smart-list>

        <ng-template #eventExploreItemTemplate let-record let-groupLabel="groupLabel">
          <app-info-card
            [card]="eventExploreInfoCardBuilder(record, { groupLabel: groupLabel })"
            (mediaStartClick)="openHostImpressions(record)"
            (mediaEndClick)="openEventExploreMembers(record)"
            (menuAction)="onEventExploreInfoCardMenuAction(record, $event)"
          ></app-info-card>
        </ng-template>
      </div>
    </div>
  </div>

  <section class="app-popup app-popup-stacked app-popup-super-stacked event-explore-topic-screen-shell" *ngIf="showTopicPicker">
    <div class="app-popup-backdrop" (click)="closeEventExploreTopicPicker($event)"></div>
    <div class="app-popup-panel popup-panel-friends-picker popup-panel-event-explore-topic" (click)="$event.stopPropagation()">
      <div class="popup-header popup-header-friends-picker event-topics-header">
        <button type="button" class="popup-close popup-back-btn" (click)="closeEventExploreTopicPicker($event)" aria-label="Back">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <div class="popup-title">
          <h2>Topic Filter</h2>
        </div>
      </div>

      <div class="popup-body popup-body-friends-picker popup-body-event-explore-topic">
        <div class="friends-picker-chip-row" *ngIf="eventExploreFilterTopic">
          <button
            type="button"
            class="values-selected-chip friends-picker-chip"
            [ngClass]="interestOptionToneClass(eventExploreFilterTopic)"
            (click)="selectEventExploreTopicFilter(eventExploreFilterTopic, $event)"
          >
            <span>#{{ eventExploreTopicLabel(eventExploreFilterTopic) }}</span>
            <mat-icon class="friends-picker-chip-remove">close</mat-icon>
          </button>
        </div>

        <div class="values-selector-popup">
          <div class="values-selector-group" *ngFor="let group of topicFilterGroups">
            <div class="social-proof-section-head" [class]="group.toneClass">
              <span class="section-tag">{{ group.icon }} {{ group.shortTitle }}</span>
              <span class="section-line"></span>
            </div>

            <div class="social-proof-chip-list">
              <button
                type="button"
                class="values-selected-chip values-option-chip"
                [class.active]="normalizeTopic(option) === normalizeTopic(eventExploreFilterTopic)"
                [ngClass]="interestOptionToneClass(option)"
                *ngFor="let option of group.options"
                (click)="selectEventExploreTopicFilter(option, $event)"
              >
                #{{ eventExploreTopicLabel(option) }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</section>
