@if (isOpen) {
  <app-popup [model]="eventExplorePopupModel()" [zIndex]="2400">
    <div class="event-explore-popup">
      <app-smart-list
        #eventExploreSmartList
        [config]="eventExploreSmartListConfig"
        [loadPage]="eventExploreLoadPage"
        [itemTemplate]="eventExploreItemTemplateRef ?? null"
        [query]="eventExploreSmartListQuery"
        (stateChange)="onEventExploreSmartListStateChange($event)"
      ></app-smart-list>
      @if (checkoutDraftCount() > 0) {
        <app-menu
          class="event-explore-basket-menu"
          kind="fab"
          title="Basket"
          [trigger]="checkoutDraftMenuTrigger()"
          [items]="checkoutDraftMenuItems()"
          [panelAlign]="'end'"
          [mobileBreakpointPx]="900"
          (itemSelect)="onEventExploreMenuSelect($event)"
        ></app-menu>
      }
      <ng-template #eventExploreItemTemplate let-record let-groupLabel="groupLabel">
        <app-info-card
          [card]="eventExploreInfoCard(record, groupLabel)"
          [useSharedMenu]="true"
          (mediaStartClick)="openHostImpressions(record)"
          (mediaEndClick)="openEventExploreMembers(record)"
          (menuAction)="onEventExploreCardMenuAction(record, $event)"
          (menuRequest)="openEventExploreInfoCardMenu(record, $event)"
        ></app-info-card>
      </ng-template>
    </div>
    <app-menu-outlet
      (itemSelect)="onEventExploreMenuSelect($event)"
    ></app-menu-outlet>
    @if (slotPickerRecord) {
      <div class="event-explore-slot-picker-backdrop" (click)="closeEventExploreSlotPicker()"></div>
    }
    @if (slotPickerRecord; as record) {
      <section class="event-explore-slot-picker">
        <header class="event-explore-slot-picker-head">
          <div>
            <h3>{{ record.title }}</h3>
            <p>{{ record.ticketing ? 'Pick a slot to book' : 'Pick a slot to join' }}</p>
          </div>
          <button type="button" class="ui-popup__close" (click)="closeEventExploreSlotPicker()" aria-label="Close slot picker">
            <mat-icon>close</mat-icon>
          </button>
        </header>
        <div class="event-explore-slot-picker-list">
          @for (slot of record.upcomingSlots ?? []; track slot) {
            <button
              type="button"
              class="event-explore-slot-option"
              (click)="selectEventExploreSlot(slot)"
              >
              <span class="event-explore-slot-option-title">{{ slot.timeframe }}</span>
              <span class="event-explore-slot-option-meta">{{ slotPickerOccupancyLabel(slot) }}</span>
            </button>
          }
        </div>
      </section>
    }
  </app-popup>
  <app-event-checkout-popup></app-event-checkout-popup>
}
