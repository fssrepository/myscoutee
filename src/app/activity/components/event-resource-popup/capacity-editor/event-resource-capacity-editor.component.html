@if (editor; as editor) {
  <section class="experience-form-overlay subevent-form-overlay subevent-group-form-overlay subevent-asset-capacity-overlay">
    <div class="experience-form-overlay-backdrop" (click)="close($event)"></div>
    <div class="experience-form-popup subevent-form-popup subevent-group-popup">
      <div class="experience-form-header subevent-group-header">
        <div class="subevent-group-header-main">
          <h3>Edit Capacity</h3>
          <p class="subevent-group-stage-subtitle">{{ editor.title }}</p>
        </div>
        <div class="experience-form-header-controls">
          <app-menu
            class="subevent-resource-save-menu"
            kind="inline"
            [items]="capacityEditorSaveMenuItems(editor)"
            (itemSelect)="onCapacityEditorMenuSelect($event)"
          ></app-menu>
          <button type="button" class="experience-form-close-btn" (click)="close($event)" aria-label="Close capacity editor">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
      <section class="experience-form-panel subevent-form-panel subevent-group-form-panel">
        <div class="experience-form-grid subevent-group-form-grid">
          <label class="subevent-capacity-range-field">
            <span>Capacity</span>
            <div class="subevent-capacity-range">
              <input
                type="number"
                min="0"
                [max]="editor.capacityMax"
                step="1"
                [ngModel]="editor.capacityMin"
                (ngModelChange)="updateMin($event)"
                [disabled]="isSavePending(editor)"
                placeholder="Min"
              />
              <span class="subevent-capacity-separator">-</span>
              <input
                type="number"
                [min]="editor.capacityMin"
                [max]="editor.capacityLimit"
                step="1"
                [ngModel]="editor.capacityMax"
                (ngModelChange)="updateMax($event)"
                [disabled]="isSavePending(editor)"
                placeholder="Max"
              />
            </div>
            @if (saveErrorMessage(editor)) {
              <p class="subevent-resource-editor-error">{{ saveErrorMessage(editor) }}</p>
            }
          </label>
        </div>
      </section>
    </div>
  </section>
}
