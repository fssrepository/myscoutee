@if (eventEditorStore.isOpenBoolean()) {
<app-popup [model]="eventEditorPopupModel()" [zIndex]="eventEditorPopupZIndex()">
    <div class="popup-body" [class.popup-panel-event-editor-readonly]="eventStructureReadOnly()">
      @if (isLoadingEventData()) {
      <div class="popup-loading-overlay" aria-busy="true">
        <app-indicator
          kind="load-ring"
          state="loading"
        ></app-indicator>
      </div>
      } @else {
      <section class="editor-list-card">
        <div class="experience-form-panel" [ngClass]="eventVisibilityClass(eventDetailDTO.visibility)">
          <div class="experience-form-grid">
            <div class="experience-description-field event-image-field">
              <app-image-carousel
                class="event-image-carousel"
                [slotCount]="1"
                [compact]="true"
                [autoSize]="true"
                ariaLabel="Event image"
                [disabled]="eventStructureReadOnly()"
                [uploadOwnerId]="eventImageUploadOwnerId()"
                [uploadEntityId]="eventImageUploadEntityId()"
                [ngModel]="eventImageUrls()"
                (ngModelChange)="onEventImageUrlsChange($event)"
              ></app-image-carousel>
            </div>
            <label class="experience-title-field">
              <span>Name <span class="required-star">*</span></span>
              <input type="text" [(ngModel)]="eventDetailDTO.title" [readonly]="eventStructureReadOnly()"
                [class.field-required-invalid]="eventEditorFieldInvalid('title')" />
            </label>
            <label class="event-capacity-range-field">
              <span>Capacity <span class="required-star">*</span></span>
              <div class="subevent-capacity-range">
                <input type="number" min="0" step="1" required [ngModel]="eventDetailDTO.capacityMin"
                  (ngModelChange)="onEventCapacityMinChange($event)" [disabled]="eventCapacityMinReadOnly()"
                  [class.field-required-invalid]="eventEditorFieldInvalid('capacityMin')" placeholder="Min" />
                <span class="subevent-capacity-separator">-</span>
                <input type="number" [min]="eventCapacityMaxMinimum()" step="1" required [ngModel]="eventDetailDTO.capacityMax"
                  (ngModelChange)="onEventCapacityMaxChange($event)" (blur)="onEventCapacityMaxBlur()"
                  [disabled]="eventCapacityMaxReadOnly()"
                  [class.field-required-invalid]="eventEditorFieldInvalid('capacityMax')" placeholder="Max" />
              </div>
            </label>
            <app-location-input
              class="experience-description-field event-location-field"
              [ngModel]="eventDetailDTO.location"
              (ngModelChange)="onEventLocationChange($event)"
              [config]="eventLocationInputConfig"
              [readOnly]="eventStructureReadOnly()"
            ></app-location-input>
            <div class="event-intel-row">
              <app-menu
                class="event-intel-menu"
                kind="inline"
                [items]="eventIntelMenuItems()"
                (itemSelect)="onEventEditorMenuSelect($event)"
              ></app-menu>
            </div>
            <label class="experience-description-field">
              <span>Description <span class="required-star">*</span></span>
              <textarea rows="4" [(ngModel)]="eventDetailDTO.subtitle" [readonly]="eventStructureReadOnly()"
                [class.field-required-invalid]="eventEditorFieldInvalid('subtitle')"></textarea>
            </label>
            <app-event-subevent-definitions-panel
              class="experience-description-field"
              [ngModel]="eventDetailDTO.subEventDefinitions"
              (ngModelChange)="onSubEventDefinitionsChange($event)"
              [(mode)]="eventDetailDTO.mode"
              [enabled]="eventDetailDTO.subEventsEnabled"
              (enabledChange)="onSubEventsEnabledChange($event)"
              [bounds]="eventDetailDTO.dateRange"
              [readOnly]="eventStructureReadOnly()"
              [disabled]="eventStructureReadOnly()"
            ></app-event-subevent-definitions-panel>
            <section class="event-scheduling-stack">
              <section class="event-schedule-panel">
                <div class="event-schedule-panel-head">
                  <span class="event-schedule-panel-title">
                    <mat-icon>calendar_month</mat-icon>
                    <span>Date</span>
                  </span>
                </div>
                <app-date-input
                  class="event-date-input"
                  [model]="eventDateInputModel"
                  [ngModel]="eventDetailDTO.dateRange"
                  (ngModelChange)="onEventDateRangeChange($event)"
                ></app-date-input>
              </section>
            <app-event-slots-input [(ngModel)]="eventDetailDTO.slotTemplates"
                [config]="eventSlotsInputConfig"
                [readOnly]="eventStructureReadOnly()"
                [disabled]="eventStructureReadOnly()"
                (overrideSelect)="openSlotOverrideEditor($event)"></app-event-slots-input>
            </section>
            <app-pricing-editor-input class="experience-description-field event-pricing-field" [(ngModel)]="eventDetailDTO.pricing"
              [config]="eventPricingEditorConfig" [readOnly]="eventStructureReadOnly()" [disabled]="eventStructureReadOnly()"></app-pricing-editor-input>
            <app-policies-input [(ngModel)]="eventDetailDTO.policies"
              [(enabled)]="eventDetailDTO.policiesEnabled"
              [readOnly]="eventPoliciesReadOnly()"
              [disabled]="eventPoliciesReadOnly()"></app-policies-input>
          </div>
        </div>
      </section>
      }
    </div>
    @if (slotOverrideEditor; as overrideEditor) {
    <div class="slot-override-popup-backdrop" (click)="closeSlotOverrideEditor($event)"></div>
    <section class="slot-override-popup" role="dialog" aria-modal="true" aria-label="Override slot">
      <header class="slot-override-popup__head">
        <div class="slot-override-popup__copy">
          <span class="slot-override-popup__title">{{ slotOverridePopupTitle() }}</span>
          <app-menu
            class="slot-override-popup__rule-badge"
            kind="select"
            [trigger]="slotOverrideRuleBadgeTrigger()"
            [items]="[]"
          ></app-menu>
        </div>
        <div class="slot-override-popup__head-actions">
          <div class="slot-override-popup__picker-actions">
            <app-menu
              class="slot-override-popup__pager"
              kind="inline"
              [items]="slotOverridePrevPagerItems()"
              (pointerdown)="$event.stopPropagation()"
              (itemSelect)="onSlotOverridePagerSelect($event)"
            ></app-menu>
            <app-menu
              class="slot-override-popup__date-menu"
              kind="select"
              [open]="slotOverrideOccurrenceMenuOpen"
              (openChange)="slotOverrideOccurrenceMenuOpen = $event"
              [trigger]="slotOverrideOccurrenceMenuTrigger()"
              [items]="slotOverrideOccurrenceMenuItems()"
              (itemSelect)="onSlotOverrideOccurrenceSelect($event)"
            ></app-menu>
            <app-menu
              class="slot-override-popup__pager"
              kind="inline"
              [items]="slotOverrideNextPagerItems()"
              (pointerdown)="$event.stopPropagation()"
              (itemSelect)="onSlotOverridePagerSelect($event)"
            ></app-menu>
          </div>
          <button type="button" class="popup-close slot-override-popup__close"
            (click)="closeSlotOverrideEditor($event)" aria-label="Close override editor">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </header>
      <div class="slot-override-popup__body">
        <app-event-subevent-definitions-panel
          class="slot-override-popup__definitions"
          [ngModel]="overrideEditor.definitions"
          (ngModelChange)="onSlotOverrideDefinitionsChange($event)"
          [(mode)]="eventDetailDTO.mode"
          modeControl="badge"
          [showEnableToggle]="false"
          [enabled]="true"
          [bounds]="eventDetailDTO.dateRange"
          [readOnly]="eventStructureReadOnly()"
          [disabled]="eventStructureReadOnly()"
        ></app-event-subevent-definitions-panel>
      </div>
    </section>
    }
</app-popup>
}
