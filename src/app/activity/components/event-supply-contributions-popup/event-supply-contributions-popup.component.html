<section class="app-popup app-popup-stacked app-popup-stacked-over-subevents event-supply-contributions-popup-shell">
  <div class="app-popup-backdrop" (click)="closeSupplyContributionsPopup()"></div>
  <div class="app-popup-panel popup-panel-asset-members" (click)="$event.stopPropagation()">
    <div class="popup-header popup-header-members-invite-mobile-layout">
      <div class="popup-title popup-title-members">
        <div class="popup-chat-title-block">
          <h2>{{ supplyPopupTitle() }}</h2>
          <p>{{ popupSubtitle() }}</p>
        </div>
      </div>
      <div class="subevent-supply-header-actions">
        <button
          type="button"
          class="popup-header-add-btn subevent-supply-contribution-add-btn"
          (click)="openBringDialog($event)"
          aria-label="Add supply quantity row"
          >
          <mat-icon>add</mat-icon>
        </button>
        <span class="header-members-count members-header-summary-badge subevent-supply-header-summary">{{ supplyContributionTotalLabel() }}</span>
      </div>
      <button mat-icon-button class="popup-close" (click)="closeSupplyContributionsPopup()" aria-label="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="popup-body popup-body-members">
      <div class="assets-member-popup subevent-supply-contributions-popup">
        <app-smart-list
          #supplyContributionSmartList
          class="subevent-supply-contribution-smart-list"
          [config]="supplyContributionSmartListConfig"
          [loadPage]="supplyContributionSmartListLoadPage"
          [itemTemplate]="supplyContributionItemTemplateRef ?? null"
          [query]="supplyContributionSmartListQuery"
          (stateChange)="onSupplyContributionSmartListStateChange($event)"
        ></app-smart-list>

        <ng-template #supplyContributionItemTemplate let-row>
          <single-row
            [row]="supplyContributionSingleRow(row)"
            (menuAction)="onSupplyContributionMenuAction(row, $event)"
          ></single-row>
        </ng-template>

        @if (resourcePopupStore.bringDialogRef(); as dialog) {
          <section class="experience-form-overlay subevent-form-overlay subevent-group-form-overlay subevent-supply-bring-overlay">
            <div class="experience-form-overlay-backdrop" (click)="cancelBringDialog()"></div>
            <div class="experience-form-popup subevent-form-popup subevent-group-popup">
              <div class="experience-form-header subevent-group-header">
                <div class="subevent-group-header-main">
                  <h3>Bring Items</h3>
                  <p class="subevent-group-stage-subtitle">{{ dialog.title }}</p>
                </div>
                <div class="experience-form-header-controls">
                  <span
                    class="subevent-supply-bring-save-btn-shell"
                    [class.is-loading]="isBringPending()"
                    [class.is-error]="!isBringPending() && !!bringErrorMessage()"
                    >
                    @if (isBringPending() || bringErrorMessage()) {
                      <span class="subevent-supply-bring-save-btn-ring" aria-hidden="true">
                        <app-progress-indicator
                          kind="action-ring"
                          shape="circle"
                          [state]="isBringPending() ? 'loading' : 'error'"
                        ></app-progress-indicator>
                      </span>
                    }
                    <button
                      type="button"
                      class="popup-header-add-btn subevent-leaderboard-save-btn subevent-supply-bring-save-btn"
                      [class.form-save-invalid]="!canSubmitBringDialog() && !isBringPending()"
                      [disabled]="!canSubmitBringDialog()"
                      (click)="confirmBringDialog($event)"
                      aria-label="Save supply quantity"
                      >
                      <mat-icon>done</mat-icon>
                    </button>
                  </span>
                  <button type="button" class="experience-form-close-btn" (click)="cancelBringDialog()" aria-label="Close bring items">
                    <mat-icon>close</mat-icon>
                  </button>
                </div>
              </div>
              <section class="experience-form-panel subevent-form-panel subevent-group-form-panel">
                <div class="experience-form-grid subevent-group-form-grid">
                  <label class="experience-title-field subevent-supply-bring-field">
                    <span class="subevent-supply-bring-field-label">Items</span>
                    <input
                      type="number"
                      [min]="dialog.min"
                      [max]="dialog.max"
                      step="1"
                      [ngModel]="dialog.quantity"
                      (ngModelChange)="onBringQuantityChange($event)"
                      [disabled]="isBringPending()"
                      placeholder="0"
                      />
                    <span class="subevent-supply-bring-range">Range: {{ dialog.min }} - {{ dialog.max }}</span>
                    @if (bringErrorMessage()) {
                      <p class="subevent-supply-bring-error">{{ bringErrorMessage() }}</p>
                    }
                  </label>
                </div>
              </section>
            </div>
          </section>
        }
      </div>
    </div>
  </div>
</section>
