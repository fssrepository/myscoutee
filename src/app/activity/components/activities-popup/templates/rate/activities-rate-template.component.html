@if (pairCard) {
  <app-pair-card
    [card]="pairCard"
    (menuRequest)="onMenuRequest($event)"
    (detailClick)="onDetailClick($event)"
  ></app-pair-card>
} @else {
  @if (singleCard) {
    <app-single-card
      [card]="singleCard"
      (menuRequest)="onMenuRequest($event)"
      (detailClick)="onDetailClick($event)"
    ></app-single-card>
  }
}
