<div class="app-popup app-popup-stacked app-popup-stacked-over-activities event-chat-popup-shell" *ngIf="session() as chatSession">
  <div class="app-popup-backdrop" (click)="close()"></div>
  <div class="app-popup-panel popup-panel-event-chat" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="item-action-menu-dismiss-layer"
      *ngIf="isSelectedChatContextMenuOpen()"
      (click)="closeContextMenu($event)"
      aria-label="Close action menu"
    ></button>
    <div class="popup-header popup-header-chat popup-header-with-chat-progress" (click)="closeContextMenu()">
      <div class="popup-title popup-title-chat">
        <div class="popup-chat-title-block">
          <h2>{{ chatSession.item.title }}</h2>
        </div>
      </div>

      <button
        type="button"
        class="chat-members-stack chat-members-stack-large chat-header-members event-editor-members-trigger event-editor-members-trigger-members popup-chat-context-btn"
        [ngClass]="selectedChatHeaderActionToneClass()"
        *ngIf="!selectedChatHasSubEventMenu()"
        (click)="openSelectedChatPrimaryContext($event)"
      >
        <span class="event-editor-members-invite">
          <mat-icon>{{ selectedChatHeaderActionIcon() }}</mat-icon>
          <span>{{ selectedChatHeaderActionLabel() }}</span>
        </span>
        <span
          class="card-badge event-editor-members-pending-badge popup-chat-context-total-badge"
          *ngIf="selectedChatHeaderActionBadgeCount() > 0"
        >
          {{ selectedChatHeaderActionBadgeCount() }}
        </span>
      </button>

      <div class="popup-chat-context-menu-wrap" *ngIf="selectedChatHasSubEventMenu()">
        <button
          type="button"
          class="chat-members-stack chat-members-stack-large chat-header-members event-editor-members-trigger event-editor-members-trigger-members popup-chat-context-btn"
          [ngClass]="selectedChatHeaderActionToneClass()"
          [class.is-open]="isSelectedChatContextMenuOpen()"
          (click)="toggleSelectedChatContextMenu($event)"
          aria-label="Open chat context menu"
        >
          <span class="event-editor-members-invite">
            <mat-icon>{{ selectedChatHeaderActionIcon() }}</mat-icon>
            <span>{{ selectedChatHeaderActionLabel() }}</span>
            <mat-icon class="popup-chat-context-chevron">expand_more</mat-icon>
          </span>
          <span
            class="card-badge event-editor-members-pending-badge popup-chat-context-total-badge"
            *ngIf="selectedChatHeaderActionBadgeCount() > 0"
          >
            {{ selectedChatHeaderActionBadgeCount() }}
          </span>
        </button>

        <div
          class="item-action-menu event-subevent-resource-menu popup-chat-context-menu"
          [class.is-open]="isSelectedChatContextMenuOpen()"
          [class.item-action-menu-mobile]="isMobileView()"
          [class.item-action-menu-desktop]="!isMobileView()"
          [class.is-open-up]="isSelectedChatContextMenuOpenUp()"
          (click)="$event.stopPropagation()"
        >
          <div class="item-action-menu-title">{{ selectedChatContextMenuTitle() }}</div>
          <button type="button" class="item-action-menu-btn" (click)="openSelectedChatPrimaryContext($event)">
            <mat-icon>{{ selectedChatHeaderActionIcon() }}</mat-icon>
            <span>{{ selectedChatHeaderActionLabel() }}</span>
          </button>
          <div class="item-action-menu-divider"></div>
          <button
            type="button"
            class="item-action-menu-btn subevent-resource-menu-item"
            *ngIf="preparedChatMembersResource as membersResource"
            [ngClass]="[membersResource.typeClass, membersResource.stateClass]"
            (click)="openSelectedChatSubEventResource(membersResource.type, $event)"
          >
            <span class="subevent-resource-menu-item-icon"><mat-icon>{{ membersResource.icon }}</mat-icon></span>
            <span class="subevent-resource-menu-item-main">
              <span class="subevent-resource-menu-item-title">{{ membersResource.title }}</span>
              <span class="subevent-resource-menu-item-value">{{ membersResource.summary }}</span>
            </span>
            <span class="rate-filter-count-badge subevent-resource-menu-item-counter" *ngIf="membersResource.pending > 0">
              {{ membersResource.pending }}
            </span>
          </button>
          <div class="item-action-menu-divider" *ngIf="preparedChatMembersResource"></div>
          <div class="item-action-menu-section-label">Assets</div>
          <button
            type="button"
            class="item-action-menu-btn subevent-resource-menu-item"
            *ngFor="let resource of preparedChatAssetResources"
            [ngClass]="[resource.typeClass, resource.stateClass]"
            (click)="openSelectedChatSubEventResource(resource.type, $event)"
          >
            <span class="subevent-resource-menu-item-icon"><mat-icon>{{ resource.icon }}</mat-icon></span>
            <span class="subevent-resource-menu-item-main">
              <span class="subevent-resource-menu-item-title">{{ resource.title }}</span>
              <span class="subevent-resource-menu-item-value">{{ resource.summary }}</span>
            </span>
            <span class="rate-filter-count-badge subevent-resource-menu-item-counter" *ngIf="resource.pending > 0">
              {{ resource.pending }}
            </span>
          </button>
        </div>
      </div>

      <button mat-icon-button type="button" class="popup-close" (click)="close()" aria-label="Close chat popup">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="popup-body popup-body-chat">
      <div class="chat-popup-wrap">
        <div class="chat-popup-box">
          <app-smart-list
            #chatThreadSmartList
            [config]="chatThreadSmartListConfig"
            [loadPage]="chatThreadLoadPage"
            [itemTemplate]="chatThreadMessageTemplate"
            [query]="chatThreadQuery"
            (stateChange)="onChatThreadSmartListStateChange($event)"
          ></app-smart-list>

          <div class="chat-compose-box">
            <textarea rows="3" placeholder="Write message" [(ngModel)]="draftMessage" [disabled]="chatInitialLoadPending"></textarea>
            <button type="button" class="chat-send-btn" aria-label="Send message" (click)="sendMessage()" [disabled]="chatInitialLoadPending">
              <mat-icon>send</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #chatThreadMessageTemplate let-message let-groupLabel="groupLabel">
  <article
    class="chat-message"
    [class.mine]="message.mine"
    [attr.data-group-label]="groupLabel"
    [attr.data-smart-list-anchor]="message.id"
    [attr.data-chat-message-id]="message.id"
  >
    <div class="chat-bubble">
      <span class="chat-sender-avatar" [class]="'user-color-' + message.senderAvatar.gender">
        {{ message.senderAvatar.initials }}
      </span>
      <div class="chat-message-content">
        <div class="chat-meta-row">
          <span class="chat-sender-name">{{ message.sender }}</span>
          <span class="chat-time-chip">{{ message.time }}</span>
        </div>
        <p class="chat-line">{{ message.text }}</p>
      </div>
      <div class="chat-readers" *ngIf="message.readBy.length > 0">
        <span class="chat-reader" *ngFor="let reader of message.readBy" [class]="'user-color-' + reader.gender">{{ reader.initials }}</span>
      </div>
    </div>
  </article>
</ng-template>
