@if (isBarKind) {
  <div
    class="app-indicator app-indicator--bar"
    [class.is-state-scrolling]="isScrollingState"
    [class.is-state-loading]="isLoadingState"
    [class.is-state-loading-overdue]="isLoadingOverdueState"
    [class.is-state-inactive]="isInactiveState"
  >
    <span class="app-indicator__bar-fill" [style.transform]="progressTransform()"></span>
    <span class="app-indicator__bar-loading" [style.transform]="progressTransform()"></span>
  </div>
} @else if (isPillBarKind) {
  <div class="app-indicator app-indicator--pill-bar">
    <span class="app-indicator__pill-bar-track" aria-hidden="true"></span>
    <span class="app-indicator__pill-bar-segments" aria-hidden="true"></span>
    <span class="app-indicator__pill-bar-fill" [style.transform]="progressTransform()"></span>
  </div>
} @else if (isLoadRingKind) {
  <span
    class="app-indicator app-indicator--load-ring"
    [class.is-state-loading]="isLoadingState"
    [class.is-state-success]="isSuccessState"
  >
    <svg viewBox="0 0 58 58" class="app-indicator__load-ring-svg">
      <circle class="app-indicator__load-ring-track" cx="29" cy="29" r="25"></circle>
      <circle
        class="app-indicator__load-ring-progress"
        cx="29"
        cy="29"
        r="25"
        pathLength="100"
        [attr.stroke-dasharray]="resolvedPerimeter"
        [attr.stroke-dashoffset]="loadRingDashOffset()"
      ></circle>
    </svg>
  </span>
} @else if (isSpinnerRingKind) {
  <span class="app-indicator app-indicator--spinner-ring">
    <svg viewBox="0 0 44 44" class="app-indicator__spinner-ring-svg">
      <circle class="app-indicator__spinner-ring-track" cx="22" cy="22" r="17"></circle>
      <circle class="app-indicator__spinner-ring-progress" cx="22" cy="22" r="17"></circle>
    </svg>
  </span>
} @else if (isActionRingKind) {
  <span class="app-indicator app-indicator--action-ring">
    @if (isActionButtonShape) {
      <svg [attr.viewBox]="actionButtonViewBox()" preserveAspectRatio="none" class="app-indicator__action-ring-svg">
        <defs>
          <linearGradient [attr.id]="actionGradientId" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgb(235, 147, 33)"></stop>
            <stop offset="100%" stop-color="rgb(247, 190, 52)"></stop>
          </linearGradient>
          <linearGradient [attr.id]="actionErrorGradientId" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgb(213, 54, 68)"></stop>
            <stop offset="100%" stop-color="rgb(196, 29, 42)"></stop>
          </linearGradient>
          <linearGradient [attr.id]="actionAccentGradientId" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgb(91, 140, 247)"></stop>
            <stop offset="100%" stop-color="rgb(47, 111, 214)"></stop>
          </linearGradient>
        </defs>
        <path
          class="app-indicator__action-ring-track"
          [attr.d]="actionButtonPath()"
        ></path>
        <path
          class="app-indicator__action-ring-progress"
          [class.is-loading]="isLoadingState"
          [attr.d]="actionButtonPath()"
          pathLength="100"
          [attr.stroke]="actionProgressStroke()"
          [attr.stroke-dasharray]="resolvedPerimeter"
          [attr.stroke-dashoffset]="actionRingDashOffset()"
        ></path>
      </svg>
    } @else {
      <svg viewBox="0 0 34 34" preserveAspectRatio="none" class="app-indicator__action-ring-svg">
        <defs>
          <linearGradient [attr.id]="actionGradientId" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgb(235, 147, 33)"></stop>
            <stop offset="100%" stop-color="rgb(247, 190, 52)"></stop>
          </linearGradient>
          <linearGradient [attr.id]="actionErrorGradientId" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgb(213, 54, 68)"></stop>
            <stop offset="100%" stop-color="rgb(196, 29, 42)"></stop>
          </linearGradient>
          <linearGradient [attr.id]="actionAccentGradientId" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgb(91, 140, 247)"></stop>
            <stop offset="100%" stop-color="rgb(47, 111, 214)"></stop>
          </linearGradient>
        </defs>
        <circle class="app-indicator__action-ring-track" cx="17" cy="17" r="15"></circle>
        <circle
          class="app-indicator__action-ring-progress app-indicator__action-ring-progress--circle"
          [class.is-loading]="isLoadingState"
          cx="17"
          cy="17"
          r="15"
          pathLength="100"
          [attr.stroke]="actionProgressStroke()"
          [attr.stroke-dasharray]="resolvedPerimeter"
          [attr.stroke-dashoffset]="actionRingDashOffset()"
        ></circle>
      </svg>
    }
  </span>
}
