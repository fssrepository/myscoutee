@if (open) {
  <section class="app-popup app-popup-stacked app-popup-super-stacked topic-picker-screen-shell">
    <div class="app-popup-backdrop" (click)="requestClose($event)"></div>
    <div class="app-popup-panel popup-panel-friends-picker popup-panel-topic-picker" (click)="$event.stopPropagation()">
      <div class="popup-header popup-header-friends-picker topic-picker-header">
        <button type="button" class="popup-close popup-back-btn" (click)="requestClose($event)" aria-label="Back">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <div class="popup-title">
          <h2>{{ title }}</h2>
        </div>
        @if (selected.length > 0) {
          <div class="friends-picker-chip-row">
            @for (topic of selected; track topic) {
              <button
                type="button"
                class="values-selected-chip friends-picker-chip"
                [ngClass]="topicToneClass(topic)"
                (click)="removeOption(topic, $event)"
                >
                <span>{{ topicLabel(topic) }}</span>
                <mat-icon class="friends-picker-chip-remove">close</mat-icon>
              </button>
            }
          </div>
        }
      </div>
      <div class="popup-body popup-body-friends-picker popup-body-topic-picker">
        @if (activeGroup(); as activeGroup) {
          <section class="topic-picker-panel" [ngClass]="activeGroup.toneClass">
            <div class="topic-picker-tabs" role="tablist" aria-label="Topic categories">
              @for (group of groups; track group; let index = $index) {
                <button
                  type="button"
                  class="topic-picker-tab"
                  [class.is-active]="isActiveGroup(index)"
                  [ngClass]="group.toneClass"
                  role="tab"
                  [attr.aria-selected]="isActiveGroup(index)"
                  (click)="selectGroup(index, $event)"
                  >
                  <span class="topic-picker-tab-icon" aria-hidden="true">{{ group.icon }}</span>
                  <span class="topic-picker-tab-label">{{ group.shortTitle }}</span>
                </button>
              }
            </div>
            <div class="values-selector-popup topic-picker-option-panel" [ngClass]="activeGroup.toneClass">
              <div class="values-selector-group">
                <div class="social-proof-chip-list">
                  @for (option of activeGroup.options; track option) {
                    <button
                      type="button"
                      class="values-selected-chip values-option-chip"
                      [class.active]="isSelected(option)"
                      [ngClass]="topicToneClass(option)"
                      (click)="toggleOption(option, $event)"
                      >
                      {{ topicLabel(option) }}
                    </button>
                  }
                </div>
              </div>
            </div>
          </section>
        }
      </div>
    </div>
  </section>
}
