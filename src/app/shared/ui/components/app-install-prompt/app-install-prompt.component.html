@if (visible) {
  <section
    class="app-install-prompt"
    aria-live="polite"
    [attr.aria-label]="'add.myscoutee.to.your.home.screen' | i18n"
  >
    <div class="app-install-prompt__panel">
      <img
        class="app-install-prompt__mark"
        src="assets/icon/android-chrome-192x192.png"
        alt=""
        width="40"
        height="40"
      />
      <div class="app-install-prompt__copy">
        <h2>{{ 'add.myscoutee.to.your.home.screen' | i18n }}</h2>
        <p>{{ 'install.prompt.description' | i18n }}</p>
      </div>
      <div class="app-install-prompt__actions">
        <button
          type="button"
          class="app-install-prompt__primary"
          [disabled]="busy"
          [attr.aria-label]="'add.to.home.screen' | i18n"
          (click)="requestInstall()"
        >
          <mat-icon>add_to_home_screen</mat-icon>
          <span>
            @if (busy) {
              {{ 'opening' | i18n }}
            } @else {
              {{ 'add.to.home.screen' | i18n }}
            }
          </span>
        </button>
        <button
          type="button"
          class="app-install-prompt__secondary"
          [disabled]="busy"
          [attr.aria-label]="'dismiss' | i18n: 'Dismiss'"
          (click)="dismiss()"
        >
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>
  </section>
}
