<div
  class="rating-star-bar"
  [class.rating-star-bar--list]="resolvedPresentation === 'list'"
  [class.rating-star-bar--fullscreen]="resolvedPresentation === 'fullscreen'"
  [class.rating-star-bar--blink]="resolvedAnimation === 'blink'"
  [class.rating-star-bar--readonly]="resolvedReadonly"
  [style.--rating-slider-accent]="sliderAccentColor"
  [style.--rating-slider-accent-shadow]="sliderAccentShadow"
  [style.--rating-slider-accent-text]="sliderAccentTextColor"
  [style.--rating-slider-accent-text-shadow]="sliderAccentTextShadow"
  >
  @if (resolvedLabel) {
    <div class="rating-star-bar__head">
      <span class="rating-star-bar__label">
        <span>{{ resolvedLabel | i18n }}</span>
        <span aria-hidden="true">:</span>
        <span class="rating-star-bar__value" aria-live="polite">{{ displayValue }}</span>
      </span>
      @if (shouldShowCommitButton) {
        <button
          type="button"
          class="rating-star-bar__commit"
          (click)="commitScore($event)"
          [attr.aria-label]="resolvedActionLabel | i18n"
          >
          <span>{{ resolvedActionLabel | i18n }}</span>
          <mat-icon>arrow_forward</mat-icon>
        </button>
      }
    </div>
  }

  <div class="rating-star-bar__slider-shell">
    <div class="rating-star-bar__track" aria-hidden="true">
      <span class="rating-star-bar__track-fill" [style.width.%]="valuePercent"></span>
    </div>
    <input
      type="range"
      class="rating-star-bar__slider"
      [min]="minimumScore"
      [max]="maximumScore"
      step="1"
      [value]="displayValue"
      [disabled]="resolvedReadonly"
      (input)="onSliderInput($event)"
      (click)="$event.stopPropagation()"
      [attr.aria-label]="resolvedLabel || 'Affinity rating'"
    />
  </div>
</div>
