@if (open) {
  <section class="firebase-auth-overlay">
    <div class="firebase-auth-backdrop" (click)="requestClose()"></div>
    <div class="firebase-auth-panel" [class.mobile-fullscreen]="isMobileView" (click)="$event.stopPropagation()">
      <div class="firebase-auth-header">
        <h2>Login</h2>
        <button
          type="button"
          class="popup-close"
          matRipple
          [matRippleColor]="'rgba(41, 78, 128, 0.12)'"
          (click)="requestClose()"
          aria-label="Close login popup"
          >
          <span class="popup-close-glyph" aria-hidden="true">×</span>
        </button>
      </div>
      @if (authStep === 'providers') {
        <div class="firebase-auth-provider-list">
          <button
            type="button"
            class="firebase-auth-provider-btn google"
            [disabled]="busy"
            matRipple
            [matRippleColor]="'rgba(66, 133, 244, 0.12)'"
            (click)="requestProvider('google')"
            >
            <span class="firebase-auth-brand-mark google-mark" aria-hidden="true">
              <span class="google-mark-letter">G</span>
            </span>
            <span>{{ busy ? 'Connecting...' : 'Continue with Google' }}</span>
          </button>
          <button
            type="button"
            class="firebase-auth-provider-btn facebook coming-soon"
            disabled
            aria-disabled="true"
            title="Facebook login is coming soon"
            >
            <span class="firebase-auth-brand-mark facebook-mark" aria-hidden="true">f</span>
            <span>Continue with Facebook</span>
            <span class="firebase-auth-provider-badge">Coming soon</span>
          </button>
          <button
            type="button"
            class="firebase-auth-provider-btn email"
            [disabled]="busy"
            matRipple
            [matRippleColor]="'rgba(54, 74, 104, 0.12)'"
            (click)="openEmail()"
            >
            <span class="firebase-auth-brand-mark email-mark" aria-hidden="true">
              <mat-icon>mail</mat-icon>
            </span>
            <span>Continue with Email</span>
          </button>
        </div>
      } @else {
        <button
          type="button"
          class="firebase-auth-back-btn"
          [disabled]="busy"
          (click)="backToProviders()"
          >
          <mat-icon>arrow_back</mat-icon>
          <span>All login options</span>
        </button>
        <form class="firebase-auth-email-form" (submit)="$event.preventDefault(); requestEmail()">
          @if (statusMessage) {
            <p class="firebase-auth-status">{{ statusMessage }}</p>
          }
          <label>
            <span>Email</span>
            <input
              type="email"
              name="email"
              autocomplete="email"
              [disabled]="busy"
              [(ngModel)]="email"
              >
          </label>
          <label>
            <span>Password</span>
              <input
              type="password"
              name="password"
              autocomplete="current-password"
              [disabled]="busy"
              [(ngModel)]="password"
              >
          </label>
          @if (emailError) {
            <p class="firebase-auth-error">{{ emailError }}</p>
          }
          <button
            type="submit"
            class="firebase-auth-main-btn"
            [disabled]="busy"
            matRipple
            [matRippleColor]="'rgba(255, 255, 255, 0.22)'"
            >
            <mat-icon>mail</mat-icon>
            <span>{{ emailSubmitLabel() }}</span>
          </button>
        </form>
      }
    </div>
  </section>
}
