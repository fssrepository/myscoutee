@if (open && draft && user) {
  @if (draft.data; as onboardingData) {
    <app-popup [model]="onboardingPopupModel()" [zIndex]="3200">
      <main class="profile-onboarding-body">
        @if (onboardingFlowModel; as flowModel) {
          <app-form-flow
            class="profile-onboarding-flow"
            [model]="flowModel"
            [(ngModel)]="draft.data"
            [saving]="saving"
            [disabled]="saving"
            (save)="onOnboardingFlowSave()"
            (action)="onOnboardingFlowAction($event)"
          ></app-form-flow>
        }

        @if (saveError) {
          <div class="profile-onboarding-error">
            <mat-icon>error</mat-icon>
            <span>{{ saveError | i18n }}</span>
          </div>
        }
      </main>
    </app-popup>

    @if (experienceManagerOpen) {
      <app-popup [model]="experienceManagerPopupModel()" [zIndex]="3300">
        <section class="profile-onboarding-experience-manager-body">
          <app-profile-experience-manager
            [ngModel]="onboardingData.experienceEntries"
            [initialFilter]="experienceManagerFilter"
            [userId]="user.id"
            [showInlineActions]="true"
            (ngModelChange)="onExperienceManagerEntriesChange($event)"
          ></app-profile-experience-manager>
        </section>
      </app-popup>
    }
  }
}
