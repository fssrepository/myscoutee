<div class="game-page" [ngClass]="gamePageStatusClass()">
  <header class="game-header">
    <a class="game-brand" aria-label="MyScoutee home">
      <img class="game-brand-mark" src="assets/logo/heart.webp" alt="MyScoutee logo" />
      <span class="game-brand-text">yScoutee</span>
    </a>
    <div class="game-actions">
      <div class="game-action-mode-select" [class.mode-pair]="isPairMode" [class.mode-single]="!isPairMode">
        <mat-select [(ngModel)]="selectedHomeMode" (ngModelChange)="selectHomeMode($event)">
          <mat-select-trigger>
            <span class="game-action-mode" [class.mode-pair]="isPairMode" [class.mode-single]="!isPairMode">
              <mat-icon>{{ selectedHomeModeIcon() }}</mat-icon>
              <span>{{ selectedHomeModeLabel() }}</span>
            </span>
          </mat-select-trigger>
          <mat-option *ngFor="let option of homeModeOptions" [value]="option.key">
            <span class="game-mode-option">
              <mat-icon>{{ option.icon }}</mat-icon>
              <span>{{ option.label }}</span>
            </span>
          </mat-option>
        </mat-select>
      </div>
      <button
        type="button"
        class="game-action-filter has-badge"
        [class.game-action-filter-has-matches]="hasRemainingCandidatesForCurrentMode"
        [class.game-action-filter-no-matches]="!hasRemainingCandidatesForCurrentMode"
        (click)="openFilter()"
        aria-label="Open profile filters"
      >
        <mat-icon>filter_alt</mat-icon>
        <span class="filter-state-badge" [class.active]="isFilterActive">{{ filterBadgeCount | counterBadge }}</span>
      </button>
      <button
        type="button"
        class="game-action-filter game-action-history has-badge"
        [class.is-disabled]="!canOpenHistory"
        [disabled]="!canOpenHistory"
        (click)="openHistory()"
        aria-label="Open game history"
      >
        <mat-icon>history</mat-icon>
        <span class="history-badge" *ngIf="historyBadgeCount > 0">{{ historyBadgeCount | counterBadge }}</span>
      </button>
    </div>
  </header>

  <section class="game-social-query-bar" *ngIf="showSocialQueryInputs()">
    <label class="game-social-query-field">
      <span>{{ isFriendsInCommonMode ? 'Person' : 'Friend A' }}</span>
      <input
        type="text"
        [value]="leftSocialQuery"
        [attr.list]="'home-social-left-suggestions'"
        [placeholder]="isFriendsInCommonMode ? 'Search person or event' : 'Search friend or event'"
        (input)="onLeftSocialQueryChanged(($any($event.target).value ?? '').toString())"
      />
    </label>
    <label class="game-social-query-field">
      <span>{{ isFriendsInCommonMode ? 'Common friend' : 'Friend B' }}</span>
      <input
        type="text"
        [value]="rightSocialQuery"
        [attr.list]="'home-social-right-suggestions'"
        [placeholder]="isFriendsInCommonMode ? 'Search common friend' : 'Search friend or event'"
        (input)="onRightSocialQueryChanged(($any($event.target).value ?? '').toString())"
      />
    </label>
    <datalist id="home-social-left-suggestions">
      <option *ngFor="let suggestion of socialQuerySuggestions('left')" [value]="suggestion"></option>
    </datalist>
    <datalist id="home-social-right-suggestions">
      <option *ngFor="let suggestion of socialQuerySuggestions('right')" [value]="suggestion"></option>
    </datalist>
  </section>

  <section class="game-layout-single">
    <div class="game-card-deck">
      <ng-template #homeFullscreenItemTemplate let-row let-renderState="renderState">
        <ng-container *ngIf="row">
          <app-pair-card
            *ngIf="row.mode === 'pair'; else homeSingleCardTemplate"
            [card]="homePairCard(row, { presentation: 'fullscreen', state: renderState })"
          ></app-pair-card>

          <ng-template #homeSingleCardTemplate>
            <app-single-card
              [card]="homeSingleCard(row, { presentation: 'fullscreen', state: renderState })"
            ></app-single-card>
          </ng-template>
        </ng-container>
      </ng-template>

      <app-smart-list
        #homeSmartList
        class="home-smart-list"
        [config]="homeSmartListConfig"
        [loadPage]="homeSmartListLoadPage"
        [fullscreenItemTemplate]="homeFullscreenItemTemplate"
        presentation="fullscreen"
        [query]="homeSmartListQuery"
        (stateChange)="onHomeSmartListStateChange($event)"
      ></app-smart-list>
    </div>
  </section>
</div>

<app-home-game-filter-popup
  *ngIf="localPopup === 'filter' && gameFilterPopupContext"
  [context]="gameFilterPopupContext"
  (closed)="onGameFilterPopupClosed($event)"
></app-home-game-filter-popup>

<section class="game-popup" *ngIf="localPopup === 'history'">
  <div class="game-popup-backdrop" (click)="closeLocalPopup()"></div>
  <div class="game-popup-panel" (click)="$event.stopPropagation()">
    <header>
      <h2>Game History</h2>
      <button type="button" (click)="closeLocalPopup()">×</button>
    </header>
    <div class="game-popup-body">
      <p>Recent ratings and mutual matches can appear here.</p>
      <p>Current placeholder keeps popup structure ready.</p>
    </div>
  </div>
</section>
