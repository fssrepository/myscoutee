<main class="main" [class.main-public]="!showNavigator">
  <div class="content" [class.content-single]="showNavigator" [class.content-public]="!showNavigator">
    <section class="content-area" [class.content-area-full]="showNavigator" [class.content-area-public]="!showNavigator">
      <router-outlet (activate)="onRouteActivated()"></router-outlet>
    </section>
  </div>
</main>

@if (showNavigator) {
  <app-navigator></app-navigator>
}

<app-install-prompt
  [visible]="installPromptVisible()"
  [busy]="installPromptBusy()"
  (installRequested)="onInstallRequested()"
  (dismissRequested)="onInstallDismissed()"
></app-install-prompt>

<app-demo-bootstrap-selector></app-demo-bootstrap-selector>

@if (routeWarmupVisible) {
  <section class="app-route-warmup" role="status" aria-live="polite" aria-label="Loading MyScoutee">
    <span class="app-route-warmup__mark">
      <span class="app-route-warmup__ring" aria-hidden="true"></span>
      <img src="assets/logo/heart.webp" alt="" />
    </span>
    <span class="app-route-warmup__label">MyScoutee</span>
  </section>
}
